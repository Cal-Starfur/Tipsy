<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- home-screen icon: the robot's flat face, drawn from the game's own
     SKIN palette (bodyTop hull, visor brow, eye light, stripe band) —
     without it iOS screenshots the page for bookmarks. -->
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>TIPSY — a clumsy delivery</title>
<style>
  html,body{margin:0;padding:0;background:#14161b;height:100%;height:100dvh;height:var(--vvh, 100dvh);overflow:hidden;touch-action:none;
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;-webkit-user-select:none;user-select:none;color:#e8eaef;}
  #wrap{display:flex;flex-direction:column;height:100%;}
  #game{flex:1;min-height:0;}
  #panel{padding:calc(10px + env(safe-area-inset-top)) 12px 8px;background:#1c1f26;border-bottom:1px solid #2b2f38;}
  #panelToggle{position:fixed;left:50%;top:56px;transform:translateX(-50%);
    color:#8f95a1;font-size:13px;letter-spacing:1px;padding:4px 12px;z-index:5;}
  #panelToggle:active{opacity:0.6;}
  #panelToggle.flipped{transform:translateX(-50%) rotate(180deg);}
  .row{display:flex;gap:8px;align-items:center;}
  .lbl{font-size:11px;letter-spacing:1.5px;color:#8f95a1;width:56px;text-transform:uppercase;}
  button{flex:1;background:#262a33;color:#e8eaef;border:1px solid #363b46;border-radius:10px;
    padding:10px 4px;font-size:13px;font-weight:600;}
  button.on{background:#ff7a1a;border-color:#ff7a1a;color:#fff;}
  button:active{transform:scale(0.96);}
  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(18,20,26,.86);color:#fff;text-align:center;z-index:10;padding:24px;}
  .overlay h1{font-size:52px;margin:0 0 4px;letter-spacing:2px;}
  .overlay h2{font-size:28px;margin:0 0 8px;}
  .overlay p{font-size:16px;line-height:1.5;color:#cfd3dc;max-width:330px;margin:5px 0;}
  .overlay .card{background:#20242d;border:1px solid #363b46;border-radius:14px;padding:14px 22px;margin:10px 0;}
  .overlay .card b{color:#ff9c4d;}
  .overlay .btn{margin-top:18px;background:#ff7a1a;color:#fff;border:none;border-radius:14px;
    padding:15px 44px;font-size:19px;font-weight:700;box-shadow:0 4px 0 #b5540e;}
  .overlay .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #b5540e;}
  #failOverlay{background:rgba(18,20,26,0);}
  #failOverlay h2,#failOverlay p{text-shadow:0 2px 3px #b5540e;transform:translateY(-135px);}
  #failOverlay p{color:#fff;}
  #failOverlay .btn{position:absolute;left:50%;bottom:59px;transform:translateX(-50%);
    flex:none;width:88px;height:88px;border-radius:50%;padding:0;
    display:flex;align-items:center;justify-content:center;}
  #failOverlay .btn:active{transform:translateX(-50%) translateY(3px);}
  #winOverlay{background:rgba(18,20,26,0);}
  #winOverlay h2,#winOverlay p{text-shadow:0 2px 3px #b5540e;transform:translateY(-165px);}
  #winOverlay p{color:#fff;}
  /* 16px above the panel top (panel = 12 + two 15px rows + 3 gap + 10 +
     safe inset), same clearance GO keeps over the map's bottom sheet —
     no more landing on the delivery info. */
  #winOverlay .btn{position:absolute;left:50%;bottom:calc(74px + env(safe-area-inset-bottom));transform:translateX(-50%);
    flex:none;width:88px;height:88px;border-radius:50%;padding:0;
    display:flex;align-items:center;justify-content:center;}
  #winOverlay .btn:active{transform:translateX(-50%) translateY(3px);}
  /* matches #bottomSheet's recipe exactly (same cream, same padding, same
     safe-area fold) plus the 20px bottom curve it can't inherit: the map
     screen gets its corners from #screenWrap's border-radius+overflow
     clip, but the win overlay lives outside that wrapper. */
  #winCard{position:absolute;left:0;right:0;bottom:0;margin:0;
    background:#f0ece0;color:#2e3138;border:none;border-radius:0 0 20px 20px;
    padding:12px 16px calc(10px + env(safe-area-inset-bottom));}
  #winCard .sheetRow + .sheetRow{margin-top:3px;}
  #winCard .sheetRow{display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:15px;line-height:1.1;}
  #winCard b{color:#b5540e;}
  .tag{color:#ff9c4d;font-weight:700;letter-spacing:1px;font-size:12px;text-transform:uppercase;}
  .brand{font-size:18px;font-weight:800;letter-spacing:1px;color:#ff7a1a;margin-bottom:8px;}
  #routeMap{display:block;}
  #titleOverlay{padding:0;justify-content:flex-start;}
  #screenWrap{width:100vw;height:100vh;height:100dvh;display:flex;flex-direction:column;
    border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.35);}
  #mapCard{position:relative;width:100%;flex:1;min-height:0;overflow:hidden;}
  #mapCard .brand{position:absolute;top:14px;left:50%;transform:translateX(-50%);margin:0;text-shadow:0 1px 4px rgba(181,84,14,.9),0 1px 4px rgba(181,84,14,.9);}
  #mapCard .card{position:absolute;top:60px;left:12px;right:12px;margin:0;background:rgba(240,236,224,.55);color:#2e3138;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);}
  #mapCard .card b{color:#b5540e;}
  #mapCard .btn{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);margin-top:0;
    width:88px;height:88px;border-radius:50%;padding:0;
    display:flex;align-items:center;justify-content:center;}
  #mapCard .btn:active{transform:translateX(-50%) translateY(3px);}
  .iconBtn{position:absolute;top:12px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.92);
    display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 6px rgba(0,0,0,.25);}
  #searchIcon{left:14px;}
  #avatarIcon{right:14px;background:#ff7a1a;}
  #bottomSheet{width:100%;background:#f0ece0;
    padding:12px 16px calc(10px + env(safe-area-inset-bottom));color:#2e3138;}
  #bottomSheet .sheetRow{display:flex;align-items:center;justify-content:space-between;}
  #bottomSheet .chev{font-size:13px;color:#8f95a1;}
  #bottomSheet .status{font-weight:700;font-size:15px;color:#b5540e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:78%;}
  #bottomSheet .listIcon{font-size:17px;color:#8f95a1;}
  /* in-game GPS readout — DOM, not canvas text: the Phaser framebuffer
     renders at CSS resolution (Scale.RESIZE, no DPR handling; K is a
     fixed constant so retina-scaling the buffer would rescale the whole
     world), which is why canvas text looked fuzzy next to the crisp DOM
     DELIVERED/fail headlines. Same element class of fix as those
     headlines: native-DPR text with their exact shadow. */
  #gpsHud{position:fixed;left:50%;bottom:calc(3px + env(safe-area-inset-bottom));
    transform:translateX(-50%);z-index:4;pointer-events:none;white-space:nowrap;
    font-size:min(22px, 4.5vw);font-weight:700;color:#fff;text-shadow:0 2px 3px #b5540e;}
  .hidden{display:none!important;}
  .big{font-size:42px;margin:2px 0;}
</style>
</head>
<body>
<div id="wrap">
  <div id="panel">
    <div class="row">
      <span class="lbl">Route</span>
      <button class="on" id="todayBtn">TODAY</button>
      <button id="rerollBtn">RANDOM DAY</button>
    </div>
  </div>
  <div id="game"></div>
  <div id="gpsHud" class="hidden"></div>
  <div id="panelToggle">︿</div>
</div>

<div id="titleOverlay" class="overlay">
  <div id="screenWrap">
    <div id="mapCard">
      <canvas id="routeMap" width="280" height="476"></canvas>
      <div class="brand">TIPSY</div>
      <button class="iconBtn" id="searchIcon">🔍</button>
      <div class="iconBtn" id="avatarIcon">
        <svg viewBox="0 0 40 46" width="23" height="27">
          <line x1="13" y1="5" x2="13" y2="11" stroke="#2e3138" stroke-width="1.5"/>
          <circle cx="13" cy="5" r="2" fill="#ff5722"/>
          <rect x="9" y="11" width="22" height="7" fill="#f7f8fa" stroke="#30343d" stroke-width="1.2"/>
          <rect x="5" y="18" width="30" height="21" fill="#f7f8fa" stroke="#30343d" stroke-width="1.2"/>
          <rect x="9" y="22" width="22" height="8" fill="#22242b"/>
          <circle cx="16" cy="26" r="1.9" fill="#7fe3ff"/>
          <circle cx="24" cy="26" r="1.9" fill="#7fe3ff"/>
          <rect x="5" y="32" width="30" height="4" fill="#c2452e"/>
          <rect x="5" y="34" width="30" height="3" fill="#ffcc33" stroke="#c9a020" stroke-width="0.5"/>
          <rect x="5" y="36" width="30" height="3" fill="#494e58"/>
        </svg>
      </div>
      <div class="card" id="orderCard">…</div>
      <button class="btn" id="startBtn">GO</button>
    </div>
    <div id="bottomSheet">
      <div class="sheetRow">
        <span class="chev">︿</span>
        <span class="status" id="sheetStatus">Ready for pickup</span>
        <span class="listIcon">☰</span>
      </div>
    </div>
  </div>
</div>

<div id="failOverlay" class="overlay hidden">
  <h2 id="failMsg">The pavement won.</h2>
  <p id="failSub">Delivery status: horizontal.</p>
  <button class="btn" id="retryBtn">Retry</button>
</div>

<div id="winOverlay" class="overlay hidden">
  <h2>DELIVERED</h2>
  <p id="winSub">…</p>
  <div class="card" id="winCard">…</div>
  <button class="btn" id="againBtn">Again</button>
</div>

<script>
  /* --vvh: the real currently-visible height, not the static viewport
     assumption 100dvh alone gives you. Exists because entering Devvit's
     expanded mode (requestExpandedMode, called from splash.ts) is a
     platform-level transition, not a normal browser window resize —
     nothing guarantees the browser re-evaluates 100dvh against the new
     modal size on its own. visualViewport tracks the actual visible
     area directly and fires its own resize event independent of the
     window's, which is the more reliable signal in an embedded/modal
     context like this. Falls back to innerHeight where visualViewport
     isn't available at all. */
  function fixViewportHeight(){
    var h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
    document.documentElement.style.setProperty('--vvh', h + 'px');
  }
  fixViewportHeight();
  window.addEventListener('resize', fixViewportHeight);
  window.addEventListener('orientationchange', fixViewportHeight);
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', fixViewportHeight);
  }
</script>
<script src="phaser.min.js"></script>
<script src="game-logic.js"></script>
</body>
</html>
