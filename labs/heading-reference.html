<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>TIPSY — Real Robot Heading Reference</title>
<style>
  html,body{margin:0;padding:0;background:#14161b;height:100%;overflow:hidden;
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;-webkit-user-select:none;user-select:none;color:#e8eaef;}
  #hdr{padding:12px 14px 4px;font-size:12px;letter-spacing:2px;color:#8f95a1;text-transform:uppercase;}
  #hdr b{color:#ff9c4d;}
  #blurb{padding:0 14px 8px;font-size:12px;color:#8f95a1;}
  #game{position:absolute;top:70px;left:0;right:0;bottom:0;}
  .lbl{position:absolute;font-family:monospace;font-size:20px;font-weight:bold;color:#ff9c4d;
    background:rgba(20,22,27,0.7);padding:2px 8px;border-radius:6px;pointer-events:none;}
  .sub{position:absolute;font-family:monospace;font-size:12px;color:#8f95a1;
    background:rgba(20,22,27,0.7);padding:1px 6px;border-radius:4px;pointer-events:none;}
</style>
</head>
<body>
<div id="hdr"><b>TIPSY</b> · real robot · heading reference</div>
<div id="blurb">Actual game geometry (drawBox/drawWheel/drawLid/drawFlag/visor), ported verbatim from game/index.html — not a stand-in marker. Same lid-open pose as your screenshots, all four headings side by side.</div>
<div id="game">
  <div class="lbl" id="lbl0"></div><div class="sub" id="sub0"></div>
  <div class="lbl" id="lbl1"></div><div class="sub" id="sub1"></div>
  <div class="lbl" id="lbl2"></div><div class="sub" id="sub2"></div>
  <div class="lbl" id="lbl3"></div><div class="sub" id="sub3"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.85.2/dist/phaser.min.js"></script>
<script>
"use strict";

/* ============================================================
   TIPSY — Real Robot Heading Reference
   Every geometry function below (drawBox, disc, drawWheel,
   drawFlag, drawLid, lidNear, flagNear, T/R/W/P/depth) is ported
   VERBATIM from game/index.html's WorldScene — same constants,
   same draw order, same face-visibility tests. The only things
   NOT reproduced are things irrelevant to a static reference:
   bobbing (bobZ=0), roll/pitch/yaw perturbations (0), tip/spill.
   Four instances side by side, one per heading, each camera-
   locked via drawAngle exactly the way the real game locks it.
   ============================================================ */

function convexHull(pts){
  const P2 = pts.slice().sort((a,b) => a.x - b.x || a.y - b.y);
  const cross = (o, a, b) => (a.x-o.x)*(b.y-o.y) - (a.y-o.y)*(b.x-o.x);
  const lo = [], hi = [];
  for(const p of P2){
    while(lo.length >= 2 && cross(lo[lo.length-2], lo[lo.length-1], p) <= 0) lo.pop();
    lo.push(p);
  }
  for(let i = P2.length-1; i >= 0; i--){
    const p = P2[i];
    while(hi.length >= 2 && cross(hi[hi.length-2], hi[hi.length-1], p) <= 0) hi.pop();
    hi.push(p);
  }
  lo.pop(); hi.pop();
  return lo.concat(hi);
}

const DIRV = [{x:1,y:0},{x:0,y:1},{x:-1,y:0},{x:0,y:-1}];

const SKIN = {
  bodyTop:0xf7f8fa, bodyRight:0xe3e6ea, bodyLeft:0xc9cdd4, outline:0x30343d,
  stripe:0xc2452e, stripeDk:0xa03824,
  wheel:0x24262c, wheelDark:0x1a1c21, wheelHubFace:0x3d424c, wheelHub:0x8a919c,
  visor:0x22242b, eye:0x7fe3ff, eyeAlert:0xffb04d,
  lidInner:0xb2b7bf, cavityWall:0x9ba1a9, cavityFloor:0x7b818a,
  belly:0x494e58, flagPole:0x2e3138, flag:0xff5722, shadow:0x000000
};
const BODY = { hx:26, hy:20, z0:14, z1:54 };
const LID  = { hx:22, hy:16, z0:54, z1:61 };
const STRIPE = { z0:20, z1:27 };
const WHEEL = { r:8, z:10, xs:[-16, 0, 16], side:22 };
const FLAG = { base:{x:-25, y:17}, z0:54, z1:97 };
const GROUND = { a:0xc9c3b4, b:0xbfb9aa, edge:0xa8a294, sky:0x9fd4e8 };

class RealRobotRef extends Phaser.Scene {
  constructor(){ super("realrobotref"); }

  create(){
    this.g = this.add.graphics();
    this.roll = 0; this.pitch = 0; this.yaw = 0;
    this.tilt = 0; this.stuckAmt = 0; this.slide = null;
    this.state = "won"; this.blinkT = 200; this.wheelPhase = 0.6;
    this.flagLean = 0; this.tipT = 0;
    this.lidAng = 0.9;          // open, matching the reference screenshots
    this.lidHingeFlip = true;   // same hinge side pickup/dropoff both use
    this.botX = 0; this.botY = 0; this.botZ = 0;
    this.scale.on("resize", () => this.layout());
    this.layout();
  }

  layout(){
    const w = this.scale.gameSize.width, h = this.scale.gameSize.height;
    this.quadW = w/2; this.quadH = h/2;
    this.K = Math.min(this.quadW, this.quadH) / 130;
    this.quads = [
      { cx: this.quadW*0.5, cy: this.quadH*0.68 },
      { cx: this.quadW*1.5, cy: this.quadH*0.68 },
      { cx: this.quadW*0.5, cy: this.quadH*1.68 },
      { cx: this.quadW*1.5, cy: this.quadH*1.68 }
    ];
    for(let f=0; f<4; f++){
      const el = document.getElementById("lbl"+f), sub = document.getElementById("sub"+f);
      el.style.left = (this.quads[f].cx - 30) + "px";
      el.style.top = (this.quads[f].cy - this.quadH*0.6) + "px";
      el.textContent = "f=" + f;
      sub.style.left = (this.quads[f].cx - 44) + "px";
      sub.style.top = (this.quads[f].cy - this.quadH*0.6 + 26) + "px";
      const d = DIRV[f];
      sub.textContent = `(${d.x},${d.y})`;
    }
  }

  /* ---------- ported verbatim ---------- */
  T(x, y, z){
    if(this.yaw !== 0){
      const c = Math.cos(this.yaw), s = Math.sin(this.yaw);
      const x2 = x*c - y*s; y = x*s + y*c; x = x2;
    }
    if(this.pitch !== 0){
      const c = Math.cos(this.pitch), s = Math.sin(this.pitch);
      const x2 = x*c - z*s; z = x*s + z*c; x = x2;
    }
    if(this.roll !== 0){
      const PIV = this.roll >= 0 ? 22 : -22;
      const y0 = y + PIV, c = Math.cos(this.roll), s = Math.sin(this.roll);
      y = -PIV + y0*c - z*s; z = y0*s + z*c;
    }
    if(this.drawAngle !== 0){
      const c = Math.cos(this.drawAngle), s = Math.sin(this.drawAngle);
      const x2 = x*c - y*s; y = x*s + y*c; x = x2;
    }
    return { x, y, z };
  }
  R(nx, ny, nz){
    if(this.yaw !== 0){
      const cy = Math.cos(this.yaw), sy = Math.sin(this.yaw);
      const nx2 = nx*cy - ny*sy; ny = nx*sy + ny*cy; nx = nx2;
    }
    if(this.pitch !== 0){
      const c = Math.cos(this.pitch), s = Math.sin(this.pitch);
      const x2 = nx*c - nz*s; nz = nx*s + nz*c; nx = x2;
    }
    const c = Math.cos(this.roll), s = Math.sin(this.roll);
    const ny2 = ny*c - nz*s, nz2 = ny*s + nz*c;
    let rx = nx, ry = ny2;
    if(this.drawAngle !== 0){
      const cy = Math.cos(this.drawAngle), sy = Math.sin(this.drawAngle);
      const rx2 = rx*cy - ry*sy; ry = rx*sy + ry*cy; rx = rx2;
    }
    return { x:rx, y:ry, z:nz2 };
  }
  W(x, y, z){
    const xr = x - this.camX, yr = y - this.camY;
    return { x:(xr - yr)*this.K + this.cx,
             y:((xr + yr)*0.5 - (z - this.camZ))*this.K + this.cy };
  }
  P(x, y, z){
    const q = this.T(x, y, z);
    return this.W(q.x + this.botX, q.y + this.botY, q.z + this.botZ);
  }
  depth(x, y, z){
    const q = this.T(x, y, z);
    return q.x + q.y + q.z*0.4;
  }
  quadOn(g, pts, color, alpha=1){
    g.fillStyle(color, alpha);
    g.fillPoints(pts.map(p => new Phaser.Geom.Point(p.x, p.y)), true, true);
  }
  edgeOn(g, pts, color=SKIN.outline, w=2){
    g.lineStyle(w, color, 1);
    g.strokePoints(pts.map(p => new Phaser.Geom.Point(p.x, p.y)), true);
  }
  quad(pts, color, alpha=1){ this.quadOn(this.g, pts, color, alpha); }
  edge(pts, color=SKIN.outline, w=2){ this.edgeOn(this.g, pts, color, w); }

  drawBox(b, cTop, cRight, cLeft, outline=true, decal=false, cBottom=SKIN.belly){
    const {hx, hy, z0, z1} = b, ox = b.ox || 0, oy = b.oy || 0;
    const C = (sx, sy, sz) => this.P(ox + sx*hx, oy + sy*hy, sz === 1 ? z1 : z0);
    const faces = [
      { n:{x:0,y:0,z: 1}, pts:[C( 1,-1,1), C( 1, 1,1), C(-1, 1,1), C(-1,-1,1)] },
      { n:{x:0,y:0,z:-1}, pts:[C( 1,-1,0), C( 1, 1,0), C(-1, 1,0), C(-1,-1,0)] },
      { n:{x: 1,y:0,z:0}, pts:[C( 1,-1,0), C( 1, 1,0), C( 1, 1,1), C( 1,-1,1)] },
      { n:{x:-1,y:0,z:0}, pts:[C(-1,-1,0), C(-1, 1,0), C(-1, 1,1), C(-1,-1,1)] },
      { n:{x:0,y: 1,z:0}, pts:[C( 1, 1,0), C(-1, 1,0), C(-1, 1,1), C( 1, 1,1)] },
      { n:{x:0,y:-1,z:0}, pts:[C( 1,-1,0), C(-1,-1,0), C(-1,-1,1), C( 1,-1,1)] }
    ];
    for(const fc of faces){
      if(decal && fc.n.z !== 0) continue;
      const w = this.R(fc.n.x, fc.n.y, fc.n.z);
      if((w.x + w.y + w.z) <= 0) continue;
      let col;
      if(w.z > 0.5)       col = decal ? cRight : cTop;
      else if(w.z < -0.5) col = decal ? null : cBottom;
      else                col = (w.x >= w.y) ? cRight : cLeft;
      if(col == null) continue;
      this.quadOn(this.g, fc.pts, col);
      if(outline) this.edgeOn(this.g, fc.pts);
    }
  }

  disc(center, r, color, outlineC){
    const pts = [];
    for(let i=0; i<14; i++){
      const a = (i/14)*Math.PI*2;
      pts.push(this.P(center.x + Math.cos(a)*r, center.y, center.z + Math.sin(a)*r));
    }
    this.quadOn(this.g, pts, color);
    if(outlineC !== undefined) this.edgeOn(this.g, pts, outlineC, 2);
  }

  drawWheel(c, sideSign){
    const W2 = 7.5;
    const ring = (oy, r) => {
      const pts = [];
      for(let i=0; i<14; i++){
        const a = (i/14)*Math.PI*2;
        pts.push(this.P(c.x + Math.cos(a)*r, oy, c.z + Math.sin(a)*r));
      }
      return pts;
    };
    const b0 = c.y - W2/2, b1 = c.y + W2/2;
    this.quadOn(this.g, convexHull(ring(b0, WHEEL.r).concat(ring(b1, WHEEL.r))), SKIN.wheelDark);
    const face = this.depth(c.x, b1, c.z) > this.depth(c.x, b0, c.z) ? b1 : b0;
    const faceRing = ring(face, WHEEL.r);
    this.quadOn(this.g, faceRing, SKIN.wheel);
    this.edgeOn(this.g, faceRing, SKIN.outline, 2);
    this.disc({x:c.x, y:face, z:c.z}, WHEEL.r*0.55, SKIN.wheelHubFace);
    const a = this.wheelPhase + c.x*0.2;
    this.disc({ x:c.x + Math.cos(a)*WHEEL.r*0.34, y:face,
                z:c.z + Math.sin(a)*WHEEL.r*0.34 }, 2.4, SKIN.wheelHub);
  }

  drawFlag(bobZ){
    const g = this.g;
    const L = FLAG.z1 - FLAG.z0;
    const bend = this.flagLean*0.5 + this.tipT*0.7;
    const seg = 6, pts = [];
    for(let i=0; i<=seg; i++){
      const s = i/seg, a = bend*s;
      pts.push(this.P(FLAG.base.x,
                      FLAG.base.y - Math.sin(a)*L*s,
                      FLAG.z0 + Math.cos(a)*L*s + bobZ));
    }
    g.lineStyle(3, SKIN.flagPole, 1);
    g.beginPath();
    g.moveTo(pts[0].x, pts[0].y);
    for(let i=1; i<=seg; i++) g.lineTo(pts[i].x, pts[i].y);
    g.strokePath();
    const p = pts[seg], q = pts[seg-1];
    let dx = p.x - q.x, dy = p.y - q.y;
    const dl = Math.hypot(dx, dy) || 1; dx /= dl; dy /= dl;
    g.fillStyle(SKIN.flag, 1);
    g.fillTriangle(p.x, p.y, p.x - dy*11, p.y + dx*11, p.x + dx*20, p.y + dy*20 + 4);
  }

  flagNear(){
    return this.depth(FLAG.base.x, FLAG.base.y, FLAG.z0 + 20) > this.depth(0, 0, 34);
  }

  lidNear(b){
    if(this.lidAng < 0.15) return true;
    const A = this.lidAng, c = Math.cos(A), s = Math.sin(A);
    const yh = -b.hy, zh = b.z0;
    const dy = -yh, dz = (b.z1 - b.z0)/2;
    return this.depth(0, yh + dy*c - dz*s, zh + dy*s + dz*c) > this.depth(0, 0, 34);
  }

  drawLid(b){
    const {hx, hy, z0, z1} = b;
    const A = this.lidAng, cA = Math.cos(A);
    const sA = Math.sin(A) * (this.lidHingeFlip ? -1 : 1);
    const yh = (this.lidHingeFlip ? hy : -hy), zh = z0;
    const H = (x, y, z) => {
      const dy = y - yh, dz = z - zh;
      return this.P(x, yh + dy*cA - dz*sA, zh + dy*sA + dz*cA);
    };
    const HN = (nx, ny, nz) => {
      const ny2 = ny*cA - nz*sA, nz2 = ny*sA + nz*cA;
      return this.R(nx, ny2, nz2);
    };
    const C = (sx, sy, sz) => H(sx*hx, sy*hy, sz === 1 ? z1 : z0);
    const faces = [
      { n:{x:0,y:0,z: 1}, pts:[C( 1,-1,1), C( 1, 1,1), C(-1, 1,1), C(-1,-1,1)] },
      { n:{x:0,y:0,z:-1}, pts:[C( 1,-1,0), C( 1, 1,0), C(-1, 1,0), C(-1,-1,0)] },
      { n:{x: 1,y:0,z:0}, pts:[C( 1,-1,0), C( 1, 1,0), C( 1, 1,1), C( 1,-1,1)] },
      { n:{x:-1,y:0,z:0}, pts:[C(-1,-1,0), C(-1, 1,0), C(-1, 1,1), C(-1,-1,1)] },
      { n:{x:0,y: 1,z:0}, pts:[C( 1, 1,0), C(-1, 1,0), C(-1, 1,1), C( 1, 1,1)] },
      { n:{x:0,y:-1,z:0}, pts:[C( 1,-1,0), C(-1,-1,0), C(-1,-1,1), C( 1,-1,1)] }
    ];
    for(const fc of faces){
      const w = HN(fc.n.x, fc.n.y, fc.n.z);
      if((w.x + w.y + w.z) <= 0) continue;
      const col = w.z > 0.5 ? SKIN.bodyTop
                : w.z < -0.5 ? SKIN.lidInner
                : (w.x >= w.y) ? SKIN.bodyRight : SKIN.bodyLeft;
      this.quad(fc.pts, col);
      this.edge(fc.pts);
    }
  }

  drawGround(half){
    const g = this.g;
    const TILE = 46;
    for(let tx=-half; tx<half; tx++){
      for(let ty=-half; ty<half; ty++){
        const cxm = tx*TILE*2 + TILE, cym = ty*TILE*2 + TILE;
        const pts = [this.W(cxm+TILE, cym-TILE, 0), this.W(cxm+TILE, cym+TILE, 0),
                     this.W(cxm-TILE, cym+TILE, 0), this.W(cxm-TILE, cym-TILE, 0)];
        this.quadOn(g, pts, ((tx+ty)%2===0) ? GROUND.a : GROUND.b);
        this.edgeOn(g, pts, GROUND.edge, 1);
      }
    }
  }

  /* ---------- the real drawRobot() body sequence, ported verbatim
     (bobZ=0 static, dt=0 for the blink timer) ---------- */
  drawRobotAt(dv){
    const g = this.g, bobZ = 0, dt = 0;
    this.drawAngle = Math.atan2(dv.y, dv.x);

    if(!this.flagNear()) this.drawFlag(bobZ);

    const wheels = [];
    for(const side of [-1, 1]){
      for(const wx of WHEEL.xs){
        const c = {x:wx, y:side*WHEEL.side, z:WHEEL.z};
        wheels.push({ c, side,
          near: this.depth(c.x, c.y, c.z) > this.depth(c.x, -c.y, c.z),
          d: this.depth(c.x, c.y, c.z) });
      }
    }
    wheels.sort((a,b) => a.d - b.d);
    for(const w of wheels) if(!w.near) this.drawWheel(w.c, w.side);

    const lidBox = {...LID, z0:LID.z0+bobZ, z1:LID.z1+bobZ};
    const lidIsNear = this.lidNear(lidBox);
    if(!lidIsNear) this.drawLid(lidBox);

    this.drawBox({hx:24, hy:17, z0:6, z1:BODY.z0+1}, 0x3f434c, 0x3a3d45, 0x2e3138, false);
    this.drawBox({...BODY, z0:BODY.z0+bobZ, z1:BODY.z1+bobZ}, SKIN.bodyTop, SKIN.bodyRight, SKIN.bodyLeft);
    this.drawBox({hx:BODY.hx+0.6, hy:BODY.hy+0.6, z0:STRIPE.z0+bobZ, z1:STRIPE.z1+bobZ},
                 null, SKIN.stripe, SKIN.stripeDk, false, true);
    if(this.lidAng > 0.12){
      const wn = this.R(0, 0, 1);
      if(wn.x + wn.y + wn.z > 0){
        const zc = LID.z0 + bobZ + 0.5;
        const ring = (hx, hy) => [
          this.P(hx,-hy,zc), this.P(hx,hy,zc), this.P(-hx,hy,zc), this.P(-hx,-hy,zc)
        ];
        this.quadOn(g, ring(LID.hx-2, LID.hy-2), SKIN.cavityWall);
        this.quadOn(g, ring(LID.hx-6, LID.hy-6), SKIN.cavityFloor);
      }
    }
    if(lidIsNear) this.drawLid(lidBox);

    const fn = this.R(1, 0, 0);
    if(fn.x + fn.y + fn.z > 0){
      const F = (y, z) => this.P(BODY.hx + 0.8, y, z + bobZ);
      this.quadOn(g, [F(-13,40), F(13,40), F(13,50), F(-13,50)], SKIN.visor);
      this.edgeOn(g, [F(-13,40), F(13,40), F(13,50), F(-13,50)], SKIN.outline, 1.5);
      const open = 1;
      const ec = SKIN.eye;
      for(const ey of [-7, 7]){
        const c = F(ey, 45);
        g.fillStyle(ec, 1);
        g.fillEllipse(c.x, c.y, 7, 7*open);
      }
    }
    for(const w of wheels) if(w.near) this.drawWheel(w.c, w.side);
    if(this.flagNear()) this.drawFlag(bobZ);
  }

  update(){
    const g = this.g; g.clear();
    g.fillStyle(GROUND.sky, 1);
    g.fillRect(0, 0, this.scale.gameSize.width, this.scale.gameSize.height);

    /* grounds first, ALL of them, before any robot — each quadrant's
       tile grid is wide enough (half=3 -> ~±276 model units, well over
       500px after projection) to bleed across into neighboring
       quadrants. Interleaving ground+robot per quadrant meant a LATER
       quadrant's ground draw could paint straight over an EARLIER
       quadrant's already-drawn robot — confirmed via pixel scan: f=0
       and f=2 (drawn earlier in the loop) had zero body-colored
       pixels, while f=1 and f=3 (drawn last in their row, nothing
       after them to cover them) rendered fine. Separating into two
       full passes fixes it regardless of draw order within each pass. */
    for(let f=0; f<4; f++){
      this.cx = this.quads[f].cx; this.cy = this.quads[f].cy;
      this.camX = 0; this.camY = 0; this.camZ = 0;
      this.drawGround(3);
    }
    for(let f=0; f<4; f++){
      this.cx = this.quads[f].cx; this.cy = this.quads[f].cy;
      this.camX = 0; this.camY = 0; this.camZ = 0;
      this.drawRobotAt(DIRV[f]);
    }
  }
}

new Phaser.Game({
  type: Phaser.AUTO, parent: "game", backgroundColor: GROUND.sky,
  scale: { mode: Phaser.Scale.RESIZE, width: "100%", height: "100%" },
  scene: [RealRobotRef]
});
</script>
</body>
</html>
