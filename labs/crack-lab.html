<!DOCTYPE html>

<style>

    padding:10px 4px;font-size:13px;font-weight:600;}

  #vals{padding:0 14px 6px;font-size:11px;color:#8f95a1;font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<div id="wrap">
  <div id="hdr"><b>TIPSY</b> · crack lab · prop.crack makeover (drive bench)</div>
  <div id="vals">…</div>
  <div id="game"></div>
  <div id="panel">
    <div class="row">
      <button id="oldBtn">OLD (game)</button>
      <button class="on" id="newBtn">NEW</button>
      <button id="driveBtn">DRIVE</button>
      <button id="reseed">RESEED</button>
    </div>
    <div class="row">
      <span class="lbl">Size</span>
      <button class="sm" data-p="len" data-d="-1">−</button>
      <button class="sm" data-p="len" data-d="1">＋</button>
      <span class="lbl">Jag</span>
      <button class="sm" data-p="jag" data-d="-1">−</button>
      <button class="sm" data-p="jag" data-d="1">＋</button>
    </div>
    <div class="row">
      <span class="lbl">Branch</span>
      <button class="sm" data-p="branches" data-d="-1">−</button>
      <button class="sm" data-p="branches" data-d="1">＋</button>
      <span class="lbl">Width</span>
      <button class="sm" data-p="width" data-d="-1">−</button>
      <button class="sm" data-p="width" data-d="1">＋</button>
      <span class="lbl">Lane</span>
      <button class="sm" id="laneBtn">0</button>
    </div>
    <div class="row">
      <span class="lbl">Zoom</span>
      <button class="sm" id="zoomOut">−</button>
      <button class="sm" id="zoomIn">＋</button>
      <span class="lbl">Bot</span>
      <button class="sm" id="botBack">◀</button>
      <button class="sm" id="botFwd">▶</button>
      <span class="lbl">Row</span>
      <button class="sm" id="rowDown">−</button>
      <button class="sm" id="rowUp">＋</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.85.2/dist/phaser.min.js"></script>
<script>
"use strict";

/* ============================================================
   TIPSY — Crack Lab v2
   Drive bench for the prop.crack makeover, on the ramp-lab
   chassis: verbatim robot + the 3-lane sidewalk/road run, so the
   crack sits on an actual lane tile and the physics is testable.
   The redesign: a seeded fissure — filled tapered body (pointy
   ends, fat belly, per-point roughness), darker core slit, forking
   hairline branches; size/shape vary per seed. Palette follows the
   surface it lands on: sidewalk (warm dark) or road (near-black).
   Physics is the game's own impact formula, with severity now
   scaled by crack SIZE: kick = speed × sev × (random ±1),
   sev = 4 × (len/46) clamped 2..8, damage += |kick|×46 — a bigger
   fissure jolts harder. LANE cycles -1/0/+1 (sidewalk, drivable)
   then 2/3 (road rows, visual palette check only).
   ============================================================ */

/* ---------- the dials (ported into the game once approved) ---------- */
const CRACK = {
  len: 46,          // main fissure run, world units (size dial)
  jag: 1.0,         // lateral jitter multiplier
  branches: 2,      // fork count
  width: 2.6,       // max half-width at the belly
  s: 4,             // tile index along the run (crack center = s*T2)
  row: 0,           // lane: -1/0/1 sidewalk (drivable), 2/3 road (visual only)
  sidewalk: { crack:0x5d574c, core:0x453f36, piece:0xa89f8f, wall:0x8f8879, rubble:0x968d7c },
  road:     { crack:0x2c2e34, core:0x14161a, piece:0x3a3d44, wall:0x2f3138, rubble:0x35383f }
};
/* severity: the game's crack sev is 4; here it scales with size */
const crackSev = () => Phaser.Math.Clamp(4 * (CRACK.len/46), 2, 8);

/* ---------- ported verbatim from game/index.html ---------- */
const TILE = 46;
const T2 = TILE*2;
const DIRV = [{x:1,y:0},{x:0,y:1},{x:-1,y:0},{x:0,y:-1}];
const PAL = { sky:0x9fd4e8, pave:0xc9c3b4, paveB:0xbfb9aa, paveEdge:0xa8a294, road:0x4a4d55, roadLine:0xd8d2c2 };
const SKIN = {
  bodyTop:0xf7f8fa, bodyRight:0xe3e6ea, bodyLeft:0xc9cdd4, outline:0x30343d,
  stripe:0xc2452e, stripeDk:0xa03824,
  wheel:0x24262c, wheelDark:0x1a1c21, wheelHubFace:0x3d424c, wheelHub:0x8a919c,
  visor:0x22242b, eye:0x7fe3ff, eyeAlert:0xffb04d,
  lidInner:0xb2b7bf, cavityWall:0x9ba1a9, cavityFloor:0x7b818a,
  belly:0x494e58, flagPole:0x2e3138, flag:0xff5722, shadow:0x000000
};
const BODY = { hx:26, hy:20, z0:14, z1:54 };
const LID  = { hx:22, hy:16, z0:54, z1:61 };
const STRIPE = { z0:20, z1:27 };
const WHEEL = { r:10, z:10, xs:[-16, 0, 16], side:22 };

function mulberry32(a){ return function(){ a |= 0; a = (a + 0x6D2B79F5) | 0; let t = Math.imul(a ^ (a >>> 15), 1 | a); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; }; }

class CrackLab extends Phaser.Scene {
  constructor(){ super("cracklab"); }

  create(){
    this.K = 2.2;
    this.mode = "new";
    this.seed = 7;
    this.botS = 1.5;
    this.botRow = 0;
    this.pitch = 0; this.roll = 0; this.yaw = 0; this.f = 0;
    this.tilt = 0; this.lidAng = 0; this.tipDir = 1; this.state = "idle";
    this.wheelPhase = 0;
    this.camX = 0; this.camY = 0; this.camZ = 0;
    this.driving = false;
    this.tipT = 0; this.tipResetT = 0;
    this.speed = 0.05;             // fixed walking speed (world units/ms)
    this.crackHit = false;         // one-shot impact re-arm, same as the game's hz.hit
    this.botZ = 2;
    this.g = this.add.graphics();
    this.scale.on("resize", () => this.layout());
    this.layout();
    this.updateVals();
  }
  layout(){
    this.cx = this.scale.gameSize.width/2;
    this.cy = this.scale.gameSize.height*0.42;
  }
  updateVals(){
    document.getElementById("vals").textContent =
      `len ${CRACK.len} · jag ${CRACK.jag.toFixed(2)} · br ${CRACK.branches} · drop ${(1.5 + CRACK.width).toFixed(1)} · sev ${crackSev().toFixed(1)} · lane ${CRACK.row}${CRACK.row >= 2 ? " (road)" : ""} · tilt ${this.tilt.toFixed(2)} · ${this.state === "tipped" ? "TIPPED" : "ok"}`;
  }

  /* ---------- ground-plane helpers (camera-relative, same as
     sidewalkend lab so tiles/slab/robot all shift together) ---------- */
  Wg(x, y, z, ox, oy){
    const xr = x - this.camX, yr = y - this.camY;
    return { x:(xr - yr)*this.K + ox, y:((xr + yr)*0.5 - (z - this.camZ))*this.K + oy };
  }
  quadg(pts, color, alpha=1){
    this.g.fillStyle(color, alpha);
    this.g.fillPoints(pts.map(p => new Phaser.Geom.Point(p.x, p.y)), true);
  }
  edgeg(pts, color, w=2){
    this.g.lineStyle(w, color, 1);
    this.g.strokePoints(pts.map(p => new Phaser.Geom.Point(p.x, p.y)), true);
  }

  /* ---------- verbatim from game/index.html: robot transform +
     projection pipeline ---------- */
  T(x, y, z){
    if(this.yaw !== 0){
      const c = Math.cos(this.yaw), s = Math.sin(this.yaw);
      const x2 = x*c - y*s; y = x*s + y*c; x = x2;
    }
    if(this.pitch !== 0){
      const c = Math.cos(this.pitch), s = Math.sin(this.pitch);
      const x2 = x*c - z*s; z = x*s + z*c; x = x2;
    }
    if(this.roll !== 0){
      const PIV = this.roll >= 0 ? 22 : -22;
      const y0 = y + PIV, c = Math.cos(this.roll), s = Math.sin(this.roll);
      y = -PIV + y0*c - z*s; z = y0*s + z*c;
    }
    let rx = x, ry = y;
    for(let i=0; i<this.f; i++){ const t = rx; rx = -ry; ry = t; }
    return { x:rx, y:ry, z };
  }
  R(nx, ny, nz){
    if(this.yaw !== 0){
      const cy = Math.cos(this.yaw), sy = Math.sin(this.yaw);
      const nx2 = nx*cy - ny*sy; ny = nx*sy + ny*cy; nx = nx2;
    }
    if(this.pitch !== 0){
      const c = Math.cos(this.pitch), s = Math.sin(this.pitch);
      const x2 = nx*c - nz*s; nz = nx*s + nz*c; nx = x2;
    }
    const c = Math.cos(this.roll), s = Math.sin(this.roll);
    const ny2 = ny*c - nz*s, nz2 = ny*s + nz*c;
    let rx = nx, ry = ny2;
    for(let i=0; i<this.f; i++){ const t = rx; rx = -ry; ry = t; }
    return { x:rx, y:ry, z:nz2 };
  }
  W(x, y, z){
    const xr = x - this.camX, yr = y - this.camY;
    return { x:(xr - yr)*this.K + this.cx,
             y:((xr + yr)*0.5 - (z - this.camZ))*this.K + this.cy };
  }
  P(x, y, z){
    const q = this.T(x, y, z);
    return this.W(q.x + this.botX, q.y + this.botY, q.z + this.botZ);
  }
  depth(x, y, z){
    const q = this.T(x, y, z);
    return q.x + q.y + q.z*0.4;
  }
  quadOn(g, pts, color, alpha=1){
    g.fillStyle(color, alpha);
    g.fillPoints(pts.map(p => new Phaser.Geom.Point(p.x, p.y)), true);
  }
  edgeOn(g, pts, color=SKIN.outline, w=2){
    g.lineStyle(w, color, 1);
    g.strokePoints(pts.map(p => new Phaser.Geom.Point(p.x, p.y)), true);
  }
  quad(pts, color, alpha=1){ this.quadOn(this.g, pts, color, alpha); }
  edge(pts, color=SKIN.outline, w=2){ this.edgeOn(this.g, pts, color, w); }

  lidNear(b){
    const hs = (this.tipDir || 1) >= 0 ? 1 : -1;
    const A = this.lidAng * hs, c = Math.cos(A), s = Math.sin(A);
    const yh = -b.hy * hs, zh = b.z0;
    const dy = -yh, dz = (b.z1 - b.z0)/2;
    return this.depth(0, yh + dy*c - dz*s, zh + dy*s + dz*c) > this.depth(0, 0, 34);
  }

  drawLid(b){
    const {hx, hy, z0, z1} = b;
    const hs = (this.tipDir || 1) >= 0 ? 1 : -1;
    const A = this.lidAng * hs, cA = Math.cos(A), sA = Math.sin(A);
    const yh = -hy * hs, zh = z0;
    const H = (x, y, z) => {
      const dy = y - yh, dz = z - zh;
      return this.P(x, yh + dy*cA - dz*sA, zh + dy*sA + dz*cA);
    };
    const HN = (nx, ny, nz) => {
      const ny2 = ny*cA - nz*sA, nz2 = ny*sA + nz*cA;
      return this.R(nx, ny2, nz2);
    };
    const C = (sx, sy, sz) => H(sx*hx, sy*hy, sz === 1 ? z1 : z0);
    const faces = [
      { n:{x:0,y:0,z: 1}, pts:[C( 1,-1,1), C( 1, 1,1), C(-1, 1,1), C(-1,-1,1)] },
      { n:{x:0,y:0,z:-1}, pts:[C( 1,-1,0), C( 1, 1,0), C(-1, 1,0), C(-1,-1,0)] },
      { n:{x: 1,y:0,z:0}, pts:[C( 1,-1,0), C( 1, 1,0), C( 1, 1,1), C( 1,-1,1)] },
      { n:{x:-1,y:0,z:0}, pts:[C(-1,-1,0), C(-1, 1,0), C(-1, 1,1), C(-1,-1,1)] },
      { n:{x:0,y: 1,z:0}, pts:[C( 1, 1,0), C(-1, 1,0), C(-1, 1,1), C( 1, 1,1)] },
      { n:{x:0,y:-1,z:0}, pts:[C( 1,-1,0), C(-1,-1,0), C(-1,-1,1), C( 1,-1,1)] }
    ];
    for(const fc of faces){
      const w = HN(fc.n.x, fc.n.y, fc.n.z);
      if((w.x + w.y + w.z) <= 0) continue;
      const col = w.z > 0.5 ? SKIN.bodyTop
                : w.z < -0.5 ? SKIN.lidInner
                : (w.x >= w.y) ? SKIN.bodyRight : SKIN.bodyLeft;
      this.quad(fc.pts, col);
      this.edge(fc.pts);
    }
  }

  disc(center, r, color, outlineC){
    const pts = [];
    for(let i=0; i<14; i++){
      const a = (i/14)*Math.PI*2;
      pts.push(this.P(center.x + Math.cos(a)*r, center.y, center.z + Math.sin(a)*r));
    }
    this.quadOn(this.g, pts, color);
    if(outlineC !== undefined) this.edgeOn(this.g, pts, outlineC, 2);
  }

  drawBox(b, cTop, cRight, cLeft, outline=true, decal=false, cBottom=SKIN.belly){
    const {hx, hy, z0, z1} = b, ox = b.ox || 0, oy = b.oy || 0;
    const C = (sx, sy, sz) => this.P(ox + sx*hx, oy + sy*hy, sz === 1 ? z1 : z0);
    const faces = [
      { n:{x:0,y:0,z: 1}, pts:[C( 1,-1,1), C( 1, 1,1), C(-1, 1,1), C(-1,-1,1)] },
      { n:{x:0,y:0,z:-1}, pts:[C( 1,-1,0), C( 1, 1,0), C(-1, 1,0), C(-1,-1,0)] },
      { n:{x: 1,y:0,z:0}, pts:[C( 1,-1,0), C( 1, 1,0), C( 1, 1,1), C( 1,-1,1)] },
      { n:{x:-1,y:0,z:0}, pts:[C(-1,-1,0), C(-1, 1,0), C(-1, 1,1), C(-1,-1,1)] },
      { n:{x:0,y: 1,z:0}, pts:[C( 1, 1,0), C(-1, 1,0), C(-1, 1,1), C( 1, 1,1)] },
      { n:{x:0,y:-1,z:0}, pts:[C( 1,-1,0), C(-1,-1,0), C(-1,-1,1), C( 1,-1,1)] }
    ];
    for(const fc of faces){
      if(decal && fc.n.z !== 0) continue;
      const w = this.R(fc.n.x, fc.n.y, fc.n.z);
      if((w.x + w.y + w.z) <= 0) continue;
      let col;
      if(w.z > 0.5)       col = decal ? cRight : cTop;
      else if(w.z < -0.5) col = decal ? null : cBottom;
      else                col = (w.x >= w.y) ? cRight : cLeft;
      if(col == null) continue;
      this.quadOn(this.g, fc.pts, col);
      if(outline) this.edgeOn(this.g, fc.pts);
    }
  }

  drawWheel(c, sideSign){
    const W2 = 7.5, steps = 5;
    const slices = [];
    for(let i=0; i<=steps; i++){
      const oy = c.y + sideSign*(-W2/2 + W2*i/steps);
      slices.push({ y:oy, depth: this.depth(c.x, oy, c.z) });
    }
    slices.sort((a,b) => a.depth - b.depth);
    for(let i=0; i<slices.length; i++){
      const isFace = i === slices.length-1;
      this.disc({x:c.x, y:slices[i].y, z:c.z}, WHEEL.r,
                isFace ? SKIN.wheel : SKIN.wheelDark,
                isFace ? SKIN.outline : undefined);
    }
    const face = slices[slices.length-1].y;
    this.disc({x:c.x, y:face, z:c.z}, WHEEL.r*0.55, SKIN.wheelHubFace);
    const a = this.wheelPhase + c.x*0.2;
    this.disc({ x:c.x + Math.cos(a)*WHEEL.r*0.34, y:face,
                z:c.z + Math.sin(a)*WHEEL.r*0.34 }, 2.4, SKIN.wheelHub);
  }

  drawRobotReal(wx, wy, wz){
    const g = this.g;
    this.botX = wx; this.botY = wy; this.botZ = wz;

    const sh = [];
    for(let i=0;i<14;i++){
      const a=(i/14)*Math.PI*2;
      sh.push(this.P(Math.cos(a)*34, Math.sin(a)*30, 0.5));
    }
    this.quadOn(g, sh, SKIN.shadow, 0.16);

    const wheels = [];
    for(const side of [-1, 1]){
      for(const wxi of WHEEL.xs){
        const c = {x:wxi, y:side*WHEEL.side, z:WHEEL.z};
        wheels.push({ c, side, near: this.depth(c.x, c.y, c.z) > this.depth(c.x, -c.y, c.z) });
      }
    }
    for(const w of wheels) if(!w.near) this.drawWheel(w.c, w.side);

    const lidBox = {...LID};
    const lidIsNear = this.lidNear(lidBox);
    if(!lidIsNear) this.drawLid(lidBox);

    this.drawBox({hx:24, hy:17, z0:6, z1:BODY.z0+1}, 0x3f434c, 0x3a3d45, 0x2e3138, false);
    this.drawBox({...BODY}, SKIN.bodyTop, SKIN.bodyRight, SKIN.bodyLeft);
    this.drawBox({hx:BODY.hx+0.6, hy:BODY.hy+0.6, z0:STRIPE.z0, z1:STRIPE.z1},
                 null, SKIN.stripe, SKIN.stripeDk, false, true);

    if(lidIsNear) this.drawLid(lidBox);

    const fn = this.R(1, 0, 0);
    if(fn.x + fn.y + fn.z > 0.3){
      const F = (y, z) => this.P(BODY.hx + 0.8, y, z);
      this.quadOn(g, [F(-13,40), F(13,40), F(13,50), F(-13,50)], SKIN.visor);
      this.edgeOn(g, [F(-13,40), F(13,40), F(13,50), F(-13,50)], SKIN.outline, 1.5);
      for(const ey of [-7, 7]){
        const c = F(ey, 45);
        g.fillStyle(SKIN.eye, 1);
        g.fillEllipse(c.x, c.y, 7, 7);
      }
      this.quadOn(g, [F(-16,18), F(16,18), F(16,22), F(-16,22)], 0xfff3b0);
    }
    for(const w of wheels) if(w.near) this.drawWheel(w.c, w.side);
  }

  /* ---------- real tile system, ported verbatim from drawWorld ----------
     No sidewalk end here — the slab is a MID-run hazard, so the run
     is just flat sidewalk + road the whole way. */
  drawTiles(ox, oy){
    const g = this.g;
    const dv = DIRV[0], rv = DIRV[1];
    for(let a = -1; a <= 10; a++){
      const rowX = a*T2, rowY = 0;
      for(let c = -1; c <= 4; c++){
        const road = c >= 2;
        const cx = rowX + rv.x*c*T2, cy = rowY + rv.y*c*T2;
        const Ax = dv.x*TILE, Ay = dv.y*TILE, Bx = rv.x*TILE, By = rv.y*TILE;
        const pts = [
          this.Wg(cx+Ax-Bx, cy+Ay-By, 0, ox, oy), this.Wg(cx+Ax+Bx, cy+Ay+By, 0, ox, oy),
          this.Wg(cx-Ax+Bx, cy-Ay+By, 0, ox, oy), this.Wg(cx-Ax-Bx, cy-Ay-By, 0, ox, oy)
        ];
        this.quadg(pts, road ? PAL.road : (((a+c)%2===0) ? PAL.pave : PAL.paveB));
        if(!road) this.edgeg(pts, PAL.paveEdge, 1.5);
        if(c === 3 && a % 2 === 0 && a >= 0 && a < 10){
          this.quadg([
            this.Wg(cx - dv.x*14 - rv.x*4, cy - dv.y*14 - rv.y*4, 0, ox, oy),
            this.Wg(cx + dv.x*14 - rv.x*4, cy + dv.y*14 - rv.y*4, 0, ox, oy),
            this.Wg(cx + dv.x*14 + rv.x*4, cy + dv.y*14 + rv.y*4, 0, ox, oy),
            this.Wg(cx - dv.x*14 + rv.x*4, cy - dv.y*14 + rv.y*4, 0, ox, oy)
          ], PAL.roadLine);
        }
      }
      const kx = rowX + rv.x*TILE*3, ky = rowY + rv.y*TILE*3;
      this.quadg([
        this.Wg(kx - dv.x*TILE, ky - dv.y*TILE, 3, ox, oy), this.Wg(kx + dv.x*TILE, ky + dv.y*TILE, 3, ox, oy),
        this.Wg(kx + dv.x*TILE, ky + dv.y*TILE, -2, ox, oy), this.Wg(kx - dv.x*TILE, ky - dv.y*TILE, -2, ox, oy)
      ], PAL.paveEdge);
    }
  }

  worldOf(s, row){
    const dv = DIRV[0], rv = DIRV[1];
    return { x: s*T2*dv.x + rv.x*row*T2, y: s*T2*dv.y + rv.y*row*T2 };
  }

  /* a crack is flat: the ground never changes under the robot */
  groundZAt(s, row){ return 2; }

  /* ---------- OLD: the game's current crack, verbatim ---------- */
  drawCrackOld(ox, oy, wx, wy){
    const g = this.g;
    const W = (dx, dy, dz) => this.Wg(wx+dx, wy+dy, dz, ox, oy);
    g.lineStyle(2.5, 0x5d574c, 1);
    let px = W(-14,-8,0.5);
    g.beginPath(); g.moveTo(px.x, px.y);
    for(const [dx,dy] of [[-4,6],[6,4],[2,10],[10,6]]){
      const q = W(dx*2, dy, 0.5); g.lineTo(q.x, q.y);
    }
    g.strokePath();
  }

  /* ---------- NEW: broken-off piece (spall) ----------
     The crack now BREAKS the tile: a jagged fracture runs between
     two points on the tile's boundary, and everything between the
     fracture and that stretch of boundary is a broken-off piece,
     sunken below the surface. Depending where the seeded boundary
     points land, the same code gives corner break-offs or edge
     bites — free per-instance variety.
     Draw order (iso-correct):
       1. sunken piece top (darker, dusty) at z 0.5 − drop
       2. rubble chips scattered on it near the fracture
       3. exposed fracture wall — the intact slab's broken face,
          quads from top level down to the piece
       4. ragged lip stroke along the fracture at top level
       5. hairline cracks radiating into the INTACT concrete
     Dials: Size = how big the piece is (boundary arc + bite depth),
     Jag = fracture raggedness, Branch = radiating hairlines,
     Width = drop depth (how far the piece sank). */
  drawCrackNew(ox, oy, wx, wy, seed){
    const g = this.g;
    const rng = mulberry32(seed);
    const pal = CRACK.row >= 2 ? CRACK.road : CRACK.sidewalk;
    const Wp = (dx, dy, dz) => this.Wg(wx+dx, wy+dy, dz, ox, oy);
    const T = TILE - 2;                                   // stay just inside the joint
    const ZT = 0.5;
    const drop = 1.5 + CRACK.width;                       // how far the piece sank
    const arc = 0.4 + (CRACK.len/84) * 1.4;               // boundary span, in edge-lengths
    const bite = Math.min(58, 10 + CRACK.len*0.5);        // how deep it eats inward

    /* tile perimeter parametrized t ∈ [0,4): one unit per edge */
    const perim = t => {
      t = ((t % 4) + 4) % 4;
      const e = Math.floor(t), u = t - e;
      if(e === 0) return { x:-T + 2*T*u, y:-T };
      if(e === 1) return { x: T, y:-T + 2*T*u };
      if(e === 2) return { x: T - 2*T*u, y: T };
      return { x:-T, y: T - 2*T*u };
    };
    const tA = rng()*4, tB = tA + arc;
    const A = perim(tA), B = perim(tB);

    /* fracture path A→B: interpolated, pulled INWARD by a belly
       profile (the bite), with seeded lateral jitter */
    const N = Math.max(5, 4 + Math.round(CRACK.len/10));
    const frac = [];
    for(let i=0; i<=N; i++){
      const u = i/N;
      let fx = A.x + (B.x - A.x)*u, fy = A.y + (B.y - A.y)*u;
      const inward = Math.pow(Math.sin(Math.PI*u), 0.8) * bite;
      const mag = Math.hypot(fx, fy) || 1;
      fx -= (fx/mag) * inward;                            // pull toward tile center
      fy -= (fy/mag) * inward;
      if(i > 0 && i < N){
        fx += (rng()-0.5) * 9 * CRACK.jag;
        fy += (rng()-0.5) * 9 * CRACK.jag;
      }
      fx = Phaser.Math.Clamp(fx, -T, T);
      fy = Phaser.Math.Clamp(fy, -T, T);
      frac.push({x:fx, y:fy});
    }

    /* the piece region: fracture path + boundary walk back B→A
       (corners crossed between tA and tB, reversed) */
    const bound = [];
    for(let c = Math.ceil(tA); c < tB; c++) bound.push(perim(c));
    const regionW = frac.concat([B]).concat(bound.reverse());

    /* 1 — sunken piece top */
    this.quadg(regionW.map(p => Wp(p.x, p.y, ZT - drop)), pal.piece);
    this.edgeg(regionW.map(p => Wp(p.x, p.y, ZT - drop)), pal.core, 1);

    /* hairline across the piece itself if it's big — it broke, after all */
    if(bite > 26){
      const m0 = frac[Math.floor(N*0.3)], m1 = frac[Math.floor(N*0.7)];
      g.lineStyle(1, pal.core, 0.9);
      const q0 = Wp(m0.x*0.6, m0.y*0.6, ZT - drop + 0.1);
      const q1 = Wp(m1.x*0.9, m1.y*0.9, ZT - drop + 0.1);
      g.lineBetween(q0.x, q0.y, q1.x, q1.y);
    }

    /* 2 — rubble chips near the fracture, on the sunken piece */
    const nCh = 3 + Math.floor(rng()*3);
    for(let i=0; i<nCh; i++){
      const fp = frac[1 + Math.floor(rng()*(N-1))];
      const p = Wp(fp.x*(0.82 + rng()*0.1), fp.y*(0.82 + rng()*0.1), ZT - drop + 0.3);
      g.fillStyle(rng() < 0.5 ? pal.crack : pal.rubble, 0.95);
      g.fillEllipse(p.x, p.y, (2 + rng()*3.5)*this.K*0.5, (1.2 + rng()*2)*this.K*0.5);
    }

    /* 3 — exposed fracture wall: the intact slab's broken face */
    for(let i=0; i<frac.length-1; i++){
      const a2 = frac[i], b2 = frac[i+1];
      this.quadg([
        Wp(a2.x, a2.y, ZT), Wp(b2.x, b2.y, ZT),
        Wp(b2.x, b2.y, ZT - drop), Wp(a2.x, a2.y, ZT - drop)
      ], i % 2 ? pal.core : pal.wall);
    }

    /* 4 — ragged lip along the fracture at top level */
    g.lineStyle(1.4, pal.crack, 1);
    g.beginPath();
    const l0 = Wp(frac[0].x, frac[0].y, ZT);
    g.moveTo(l0.x, l0.y);
    for(let i=1; i<frac.length; i++){
      const q = Wp(frac[i].x, frac[i].y, ZT);
      g.lineTo(q.x, q.y);
    }
    g.strokePath();

    /* 5 — hairlines radiating from the fracture into the INTACT slab */
    for(let b=0; b<CRACK.branches; b++){
      const i0 = 1 + Math.floor(rng()*(N-1));
      let bx = frac[i0].x, by = frac[i0].y;
      const mag = Math.hypot(bx, by) || 1;
      let ba = Math.atan2(-by/mag, -bx/mag) + (rng()-0.5)*1.4;  // roughly inward
      let bl = 5 + rng()*8;
      for(let k=0; k<3; k++){
        const nx2 = Phaser.Math.Clamp(bx + Math.cos(ba)*bl, -T, T);
        const ny2 = Phaser.Math.Clamp(by + Math.sin(ba)*bl, -T, T);
        g.lineStyle(Math.max(0.8, (1.5 - k*0.45)*this.K*0.4), pal.crack, 0.95);
        const p1 = Wp(bx, by, ZT), p2 = Wp(nx2, ny2, ZT);
        g.lineBetween(p1.x, p1.y, p2.x, p2.y);
        bx = nx2; by = ny2;
        ba += (rng()-0.5)*1.2*CRACK.jag;
        bl *= 0.6;
      }
    }
  }

  update(time, delta){
    const g = this.g; g.clear();
    g.fillStyle(PAL.sky, 1);
    g.fillRect(0, 0, this.scale.gameSize.width, this.scale.gameSize.height);

    const dt = Math.min(delta || 16.7, 50);

    /* DRIVE: this.speed is world-units/ms, botS in tile multiples,
       so ds = speed/T2*dt. Crack physics is the game's own generic
       impact, ported exactly — one-shot per approach:
         if(!hz.hit && |dx| < 26 && row match){
           kick = speed × sev × (random ±1); tilt += kick;
           damage += |kick| × 46
         }
       — with sev now scaled by crack SIZE (crackSev(): 4×len/46,
       clamped 2..8), because a bigger fissure jolts harder. The
       stability spring (0.0021/ms) and tip threshold (|tilt| ≥ 1)
       are the game's own. Road lanes (2/3) aren't reachable — they
       exist here for the asphalt palette check. */
    if(this.driving && this.state !== "tipped"){
      this.botS += (this.speed / T2) * dt;
      this.wheelPhase += this.speed * dt * 0.28;
      const dx = this.botS*T2 - CRACK.s*T2;

      if(this.botRow === CRACK.row && CRACK.row < 2){
        if(!this.crackHit && Math.abs(dx) < 26){
          this.crackHit = true;
          const kick = this.speed * crackSev() * (Math.random() < 0.5 ? 1 : -1);
          this.tilt += kick;
        }
        if(Math.abs(dx) > 40) this.crackHit = false;   // re-arm, same as the game
      }

      this.tilt -= this.tilt * 0.0021 * dt;            // stability spring
      this.roll = Phaser.Math.Clamp(this.tilt, -1, 1) * 0.5;

      if(Math.abs(this.tilt) >= 1){
        this.state = "tipped";
        this.tipDir = Math.sign(this.tilt);
        this.tipT = 0;
      }

      if(this.botS > 8){
        this.botS = 0; this.tilt = 0; this.roll = 0; this.pitch = 0;
        this.crackHit = false;
      }
    }

    /* tipped-state rollover: the game's formula, auto-reset so DRIVE
       keeps looping without manual cleanup */
    if(this.state === "tipped"){
      this.tipT = Math.min(1, this.tipT + dt/900);
      this.roll = this.tipDir * (Math.PI*0.5) * this.tipT;
      if(this.tipT >= 1){
        this.tipResetT = (this.tipResetT || 0) + dt;
        if(this.tipResetT > 1400){
          this.state = "idle"; this.tipT = 0; this.tipResetT = 0;
          this.botS = 0; this.tilt = 0; this.roll = 0; this.pitch = 0;
          this.botZ = 2; this.crackHit = false;
        }
      }
    }

    /* camera follows with forward lead, set before any drawing */
    const bwp = this.worldOf(this.botS, this.botRow);
    const dv = DIRV[0];
    this.camX = bwp.x + dv.x*60;
    this.camY = bwp.y + dv.y*60;
    this.camZ = 0;

    this.drawTiles(this.cx, this.cy);

    const swp = this.worldOf(CRACK.s, CRACK.row);
    if(this.mode === "old"){
      this.drawCrackOld(this.cx, this.cy, swp.x, swp.y);
    } else {
      this.drawCrackNew(this.cx, this.cy, swp.x, swp.y, this.seed*7919 + 13);
    }

    this.drawRobotReal(bwp.x, bwp.y, this.botZ);
    if(this.driving || this.state === "tipped") this.updateVals();
  }
}

const game = new Phaser.Game({
  type: Phaser.AUTO, parent: "game",
  scale: { mode: Phaser.Scale.RESIZE, width: "100%", height: "100%" },
  scene: [CrackLab]
});
const scn = () => game.scene.getScene("cracklab");

document.getElementById("oldBtn").addEventListener("click", e => {
  scn().mode = "old";
  e.target.classList.add("on");
  document.getElementById("newBtn").classList.remove("on");
});
document.getElementById("newBtn").addEventListener("click", e => {
  scn().mode = "new";
  e.target.classList.add("on");
  document.getElementById("oldBtn").classList.remove("on");
});
document.getElementById("driveBtn").addEventListener("click", e => {
  const s = scn();
  s.driving = !s.driving;
  e.target.classList.toggle("on", s.driving);
});
document.getElementById("reseed").addEventListener("click", () => {
  scn().seed = Math.floor(Math.random()*99999);
});
document.getElementById("laneBtn").addEventListener("click", e => {
  /* cycle -1 -> 0 -> 1 (sidewalk lanes) -> 2 -> 3 (road, visual only) */
  const order = [-1, 0, 1, 2, 3];
  CRACK.row = order[(order.indexOf(CRACK.row) + 1) % order.length];
  e.target.textContent = String(CRACK.row);
  scn().updateVals();
});
document.getElementById("zoomIn").addEventListener("click", () => { scn().K = Math.min(scn().K + 0.4, 6); });
document.getElementById("zoomOut").addEventListener("click", () => { scn().K = Math.max(scn().K - 0.4, 1.2); });
document.getElementById("botBack").addEventListener("click", () => { const s=scn(); s.botS = Math.max(0, s.botS - 0.5); s.botZ = s.groundZAt(s.botS, s.botRow); s.updateVals(); });
document.getElementById("botFwd").addEventListener("click", () => { const s=scn(); s.botS = Math.min(8, s.botS + 0.5); s.botZ = s.groundZAt(s.botS, s.botRow); s.updateVals(); });
document.getElementById("rowDown").addEventListener("click", () => { const s=scn(); s.botRow = Math.max(-1, s.botRow - 1); s.botZ = s.groundZAt(s.botS, s.botRow); s.updateVals(); });
document.getElementById("rowUp").addEventListener("click", () => { const s=scn(); s.botRow = Math.min(1, s.botRow + 1); s.botZ = s.groundZAt(s.botS, s.botRow); s.updateVals(); });
document.querySelectorAll("[data-p]").forEach(btn => {
  btn.addEventListener("click", () => {
    const p = btn.dataset.p, d = +btn.dataset.d;
    if(p === "len")      CRACK.len      = Phaser.Math.Clamp(CRACK.len + d*8, 16, 84);
    if(p === "jag")      CRACK.jag      = Phaser.Math.Clamp(+(CRACK.jag + d*0.2).toFixed(2), 0.2, 2.4);
    if(p === "branches") CRACK.branches = Phaser.Math.Clamp(CRACK.branches + d, 0, 5);
    if(p === "width")    CRACK.width    = Phaser.Math.Clamp(+(CRACK.width + d*0.4).toFixed(1), 1.0, 6.0);
    scn().updateVals();
  });
});
</script>
