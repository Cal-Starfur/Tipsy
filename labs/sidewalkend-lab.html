<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>TIPSY — Sidewalk End Lab</title>
<style>
  html,body{margin:0;padding:0;background:#14161b;height:100%;overflow:hidden;touch-action:manipulation;
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;-webkit-user-select:none;user-select:none;color:#e8eaef;}
  #wrap{display:flex;flex-direction:column;height:100%;}
  #game{flex:1;min-height:0;}
  #panel{padding:10px 12px calc(14px + env(safe-area-inset-bottom));background:#1c1f26;border-top:1px solid #2b2f38;}
  .row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
  .row:last-child{margin-bottom:0;}
  .lbl{font-size:11px;letter-spacing:1.5px;color:#8f95a1;width:56px;text-transform:uppercase;}
  button{flex:1;background:#262a33;color:#e8eaef;border:1px solid #363b46;border-radius:10px;
    padding:10px 4px;font-size:13px;font-weight:600;}
  button.on{background:#ff7a1a;border-color:#ff7a1a;color:#fff;}
  button:active{transform:scale(0.96);}
  button.sm{flex:0 0 44px;}
  #hdr{padding:10px 14px 2px;font-size:12px;letter-spacing:2px;color:#8f95a1;text-transform:uppercase;}
  #hdr b{color:#ff9c4d;}
  #vals{padding:0 14px 6px;font-size:11px;color:#8f95a1;font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<div id="wrap">
  <div id="hdr"><b>TIPSY</b> · sidewalk end lab · real robot + real tiles</div>
  <div id="vals">…</div>
  <div id="game"></div>
  <div id="panel">
    <div class="row">
      <span class="lbl">Style</span>
      <button id="oldBtn">OLD (game)</button>
      <button class="on" id="newBtn">NEW</button>
      <button id="matBtn">CONCRETE</button>
      <button id="driveBtn">DRIVE</button>
    </div>
    <div class="row">
      <span class="lbl">Zoom</span>
      <button class="sm" id="zoomOut">−</button>
      <button class="sm" id="zoomIn">＋</button>
      <span class="lbl">Seed</span>
      <button class="sm" id="reseed">🎲</button>
      <span style="flex:1"></span>
    </div>
    <div class="row">
      <span class="lbl">Depth</span>
      <button class="sm" data-p="width" data-d="-1">−</button>
      <button class="sm" data-p="width" data-d="1">＋</button>
      <span class="lbl">Wear</span>
      <button class="sm" data-p="wear" data-d="-1">−</button>
      <button class="sm" data-p="wear" data-d="1">＋</button>
    </div>
    <div class="row">
      <span class="lbl" style="width:auto;flex:1">Cross-width 276 (3 tiles) · axis-aligned, no taper/skew</span>
    </div>
    <div class="row">
      <span class="lbl">Robot s</span>
      <button class="sm" id="botBack">◀</button>
      <button class="sm" id="botFwd">▶</button>
      <span class="lbl">Row</span>
      <button class="sm" id="rowDown">−</button>
      <button class="sm" id="rowUp">＋</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.85.2/dist/phaser.min.js"></script>
<script>
"use strict";

/* ============================================================
   TIPSY — Sidewalk End Lab v3
   The sidewalk/road tiles AND the robot are now pulled verbatim
   from game/index.html — not reconstructions. Tile loop: same
   TILE/T2/column code. Robot: the actual T()/R()/W()/P()/depth(),
   drawBox()/drawWheel()/drawLid()/lidNear() methods, the actual
   BODY/LID/WHEEL/STRIPE/SKIN constants, posed statically (idle,
   lid closed, no tilt) rather than mid-simulation. If it looks
   right here, it IS what the game will render — no guessing.
   ============================================================ */

const DRIVE = {
  width: 92, wear: 3,   // width(depth)=92 -> 184 total = exactly 2 sidewalk tiles
  row: 0, s: 3.5,   // row 0 = dead center of the near 3-lane sidewalk
                     // s=3.5 = exactly tile-rows 3+4 combined (see note in drawTiles) —
                     // the LAST 2 rows of the sidewalk segment before it ends
  sFar: null,        // computed after drawTiles' row layout is known (see update())
  material: "concrete",
  concrete: { base: 0xb5afa2, baseDk: 0x968f81, joint: 0x968f81, stain: 0x8f8879 },
  asphalt:  { base: 0x4a4d55, baseDk: 0x3a3d44, joint: 0x5c5f68, stain: 0x2e3036 },
  shadow: 0x000000
};

/* ---------- ported verbatim from game/index.html ---------- */
const TILE = 46;
const T2 = TILE*2;
const DIRV = [{x:1,y:0},{x:0,y:1},{x:-1,y:0},{x:0,y:-1}];
const PAL = { sky:0x9fd4e8, pave:0xc9c3b4, paveB:0xbfb9aa, paveEdge:0xa8a294, road:0x4a4d55, roadLine:0xd8d2c2 };
const SKIN = {
  bodyTop:0xf7f8fa, bodyRight:0xe3e6ea, bodyLeft:0xc9cdd4, outline:0x30343d,
  stripe:0xc2452e, stripeDk:0xa03824,
  wheel:0x24262c, wheelDark:0x1a1c21, wheelHubFace:0x3d424c, wheelHub:0x8a919c,
  visor:0x22242b, eye:0x7fe3ff, eyeAlert:0xffb04d,
  lidInner:0xb2b7bf, cavityWall:0x9ba1a9, cavityFloor:0x7b818a,
  belly:0x494e58, flagPole:0x2e3138, flag:0xff5722, shadow:0x000000
};
const BODY = { hx:26, hy:20, z0:14, z1:54 };
const LID  = { hx:22, hy:16, z0:54, z1:61 };
const STRIPE = { z0:20, z1:27 };
const WHEEL = { r:10, z:10, xs:[-16, 0, 16], side:22 };

function mulberry32(a){ return function(){ a |= 0; a = (a + 0x6D2B79F5) | 0; let t = Math.imul(a ^ (a >>> 15), 1 | a); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; }; }

class SidewalkEndLab extends Phaser.Scene {
  constructor(){ super("sidewalkendlab"); }

  create(){
    this.K = 2.2;
    this.mode = "new";
    this.seed = 7;
    this.botS = 2;   // start a bit before the ramp so DRIVE has a run-up
    this.botRow = 0;
    /* robot pose state — same properties T()/R()/P() read. Static
       (pitch/roll/yaw all 0) until DRIVE is on; then roll actually
       responds to the ramp's tilt hazard, same formula as the game. */
    this.pitch = 0; this.roll = 0; this.yaw = 0; this.f = 0;
    this.tilt = 0; this.lidAng = 0; this.tipDir = 1; this.state = "idle";
    this.wheelPhase = 0; this.blinkT = 130; this.stuckAmt = 0;
    this.camX = 0; this.camY = 0; this.camZ = 0;
    this.driving = false;
    this.tipT = 0; this.tipResetT = 0;
    this.speed = 0.05;             // fixed walking speed for this preview (units/ms)
    this.lastT = 0;
    this.g = this.add.graphics();
    this.scale.on("resize", () => this.layout());
    this.layout();
    this.updateVals();
  }
  layout(){
    this.cx = this.scale.gameSize.width/2;
    this.cy = this.scale.gameSize.height*0.42;
  }
  updateVals(){
    document.getElementById("vals").textContent =
      `cross-width 276 (fixed, 3 tiles) · depth ${DRIVE.width} · wear ${DRIVE.wear} · ${DRIVE.material} · robot s ${this.botS.toFixed(2)} · tilt ${this.tilt.toFixed(2)} · roll ${this.roll.toFixed(2)} · ${this.state === "tipped" ? "TIPPED" : (this.isBlocked ? "STUCK" : "ok")}`;
  }

  /* ---------- ground-plane helpers (labs' own convention, used for
     tiles/driveway which aren't robot-relative) — now camera-relative
     too, same as W() below, so tiles/driveway/robot all shift
     together when the camera follows the robot */
  Wg(x, y, z, ox, oy){
    const xr = x - this.camX, yr = y - this.camY;
    return { x:(xr - yr)*this.K + ox, y:((xr + yr)*0.5 - (z - this.camZ))*this.K + oy };
  }
  quadg(pts, color, alpha=1){
    this.g.fillStyle(color, alpha);
    this.g.fillPoints(pts.map(p => new Phaser.Geom.Point(p.x, p.y)), true);
  }
  edgeg(pts, color, w=2){
    this.g.lineStyle(w, color, 1);
    this.g.strokePoints(pts.map(p => new Phaser.Geom.Point(p.x, p.y)), true);
  }

  /* ---------- verbatim from game/index.html: robot transform +
     projection pipeline ---------- */
  T(x, y, z){
    if(this.yaw !== 0){
      const c = Math.cos(this.yaw), s = Math.sin(this.yaw);
      const x2 = x*c - y*s; y = x*s + y*c; x = x2;
    }
    if(this.pitch !== 0){
      const c = Math.cos(this.pitch), s = Math.sin(this.pitch);
      const x2 = x*c - z*s; z = x*s + z*c; x = x2;
    }
    if(this.roll !== 0){
      const PIV = this.roll >= 0 ? 22 : -22;
      const y0 = y + PIV, c = Math.cos(this.roll), s = Math.sin(this.roll);
      y = -PIV + y0*c - z*s; z = y0*s + z*c;
    }
    let rx = x, ry = y;
    for(let i=0; i<this.f; i++){ const t = rx; rx = -ry; ry = t; }
    return { x:rx, y:ry, z };
  }
  R(nx, ny, nz){
    if(this.yaw !== 0){
      const cy = Math.cos(this.yaw), sy = Math.sin(this.yaw);
      const nx2 = nx*cy - ny*sy; ny = nx*sy + ny*cy; nx = nx2;
    }
    if(this.pitch !== 0){
      const c = Math.cos(this.pitch), s = Math.sin(this.pitch);
      const x2 = nx*c - nz*s; nz = nx*s + nz*c; nx = x2;
    }
    const c = Math.cos(this.roll), s = Math.sin(this.roll);
    const ny2 = ny*c - nz*s, nz2 = ny*s + nz*c;
    let rx = nx, ry = ny2;
    for(let i=0; i<this.f; i++){ const t = rx; rx = -ry; ry = t; }
    return { x:rx, y:ry, z:nz2 };
  }
  W(x, y, z){
    const xr = x - this.camX, yr = y - this.camY;
    return { x:(xr - yr)*this.K + this.cx,
             y:((xr + yr)*0.5 - (z - this.camZ))*this.K + this.cy };
  }
  P(x, y, z){
    const q = this.T(x, y, z);
    return this.W(q.x + this.botX, q.y + this.botY, q.z + this.botZ);
  }
  depth(x, y, z){
    const q = this.T(x, y, z);
    return q.x + q.y + q.z*0.4;
  }
  quadOn(g, pts, color, alpha=1){
    g.fillStyle(color, alpha);
    g.fillPoints(pts.map(p => new Phaser.Geom.Point(p.x, p.y)), true);
  }
  edgeOn(g, pts, color=SKIN.outline, w=2){
    g.lineStyle(w, color, 1);
    g.strokePoints(pts.map(p => new Phaser.Geom.Point(p.x, p.y)), true);
  }
  quad(pts, color, alpha=1){ this.quadOn(this.g, pts, color, alpha); }
  edge(pts, color=SKIN.outline, w=2){ this.edgeOn(this.g, pts, color, w); }

  lidNear(b){
    const hs = (this.tipDir || 1) >= 0 ? 1 : -1;
    const A = this.lidAng * hs, c = Math.cos(A), s = Math.sin(A);
    const yh = -b.hy * hs, zh = b.z0;
    const dy = -yh, dz = (b.z1 - b.z0)/2;
    return this.depth(0, yh + dy*c - dz*s, zh + dy*s + dz*c) > this.depth(0, 0, 34);
  }

  drawLid(b){
    const {hx, hy, z0, z1} = b;
    const hs = (this.tipDir || 1) >= 0 ? 1 : -1;
    const A = this.lidAng * hs, cA = Math.cos(A), sA = Math.sin(A);
    const yh = -hy * hs, zh = z0;
    const H = (x, y, z) => {
      const dy = y - yh, dz = z - zh;
      return this.P(x, yh + dy*cA - dz*sA, zh + dy*sA + dz*cA);
    };
    const HN = (nx, ny, nz) => {
      const ny2 = ny*cA - nz*sA, nz2 = ny*sA + nz*cA;
      return this.R(nx, ny2, nz2);
    };
    const C = (sx, sy, sz) => H(sx*hx, sy*hy, sz === 1 ? z1 : z0);
    const faces = [
      { n:{x:0,y:0,z: 1}, pts:[C( 1,-1,1), C( 1, 1,1), C(-1, 1,1), C(-1,-1,1)] },
      { n:{x:0,y:0,z:-1}, pts:[C( 1,-1,0), C( 1, 1,0), C(-1, 1,0), C(-1,-1,0)] },
      { n:{x: 1,y:0,z:0}, pts:[C( 1,-1,0), C( 1, 1,0), C( 1, 1,1), C( 1,-1,1)] },
      { n:{x:-1,y:0,z:0}, pts:[C(-1,-1,0), C(-1, 1,0), C(-1, 1,1), C(-1,-1,1)] },
      { n:{x:0,y: 1,z:0}, pts:[C( 1, 1,0), C(-1, 1,0), C(-1, 1,1), C( 1, 1,1)] },
      { n:{x:0,y:-1,z:0}, pts:[C( 1,-1,0), C(-1,-1,0), C(-1,-1,1), C( 1,-1,1)] }
    ];
    for(const fc of faces){
      const w = HN(fc.n.x, fc.n.y, fc.n.z);
      if((w.x + w.y + w.z) <= 0) continue;
      const col = w.z > 0.5 ? SKIN.bodyTop
                : w.z < -0.5 ? SKIN.lidInner
                : (w.x >= w.y) ? SKIN.bodyRight : SKIN.bodyLeft;
      this.quad(fc.pts, col);
      this.edge(fc.pts);
    }
  }

  disc(center, r, color, outlineC){
    const pts = [];
    for(let i=0; i<14; i++){
      const a = (i/14)*Math.PI*2;
      pts.push(this.P(center.x + Math.cos(a)*r, center.y, center.z + Math.sin(a)*r));
    }
    this.quadOn(this.g, pts, color);
    if(outlineC !== undefined) this.edgeOn(this.g, pts, outlineC, 2);
  }

  drawBox(b, cTop, cRight, cLeft, outline=true, decal=false, cBottom=SKIN.belly){
    const {hx, hy, z0, z1} = b, ox = b.ox || 0, oy = b.oy || 0;
    const C = (sx, sy, sz) => this.P(ox + sx*hx, oy + sy*hy, sz === 1 ? z1 : z0);
    const faces = [
      { n:{x:0,y:0,z: 1}, pts:[C( 1,-1,1), C( 1, 1,1), C(-1, 1,1), C(-1,-1,1)] },
      { n:{x:0,y:0,z:-1}, pts:[C( 1,-1,0), C( 1, 1,0), C(-1, 1,0), C(-1,-1,0)] },
      { n:{x: 1,y:0,z:0}, pts:[C( 1,-1,0), C( 1, 1,0), C( 1, 1,1), C( 1,-1,1)] },
      { n:{x:-1,y:0,z:0}, pts:[C(-1,-1,0), C(-1, 1,0), C(-1, 1,1), C(-1,-1,1)] },
      { n:{x:0,y: 1,z:0}, pts:[C( 1, 1,0), C(-1, 1,0), C(-1, 1,1), C( 1, 1,1)] },
      { n:{x:0,y:-1,z:0}, pts:[C( 1,-1,0), C(-1,-1,0), C(-1,-1,1), C( 1,-1,1)] }
    ];
    for(const fc of faces){
      if(decal && fc.n.z !== 0) continue;
      const w = this.R(fc.n.x, fc.n.y, fc.n.z);
      if((w.x + w.y + w.z) <= 0) continue;
      let col;
      if(w.z > 0.5)       col = decal ? cRight : cTop;
      else if(w.z < -0.5) col = decal ? null : cBottom;
      else                col = (w.x >= w.y) ? cRight : cLeft;
      if(col == null) continue;
      this.quadOn(this.g, fc.pts, col);
      if(outline) this.edgeOn(this.g, fc.pts);
    }
  }

  drawWheel(c, sideSign){
    const W2 = 7.5, steps = 5;
    const slices = [];
    for(let i=0; i<=steps; i++){
      const oy = c.y + sideSign*(-W2/2 + W2*i/steps);
      slices.push({ y:oy, depth: this.depth(c.x, oy, c.z) });
    }
    slices.sort((a,b) => a.depth - b.depth);
    for(let i=0; i<slices.length; i++){
      const isFace = i === slices.length-1;
      this.disc({x:c.x, y:slices[i].y, z:c.z}, WHEEL.r,
                isFace ? SKIN.wheel : SKIN.wheelDark,
                isFace ? SKIN.outline : undefined);
    }
    const face = slices[slices.length-1].y;
    this.disc({x:c.x, y:face, z:c.z}, WHEEL.r*0.55, SKIN.wheelHubFace);
    const a = this.wheelPhase + c.x*0.2;
    this.disc({ x:c.x + Math.cos(a)*WHEEL.r*0.34, y:face,
                z:c.z + Math.sin(a)*WHEEL.r*0.34 }, 2.4, SKIN.wheelHub);
  }

  /* ---------- the actual static-pose draw sequence, matching
     drawRobot()'s rendering portion (lines ~1739-1799 in the game)
     verbatim, minus the simulation block and driving-only effects
     (bob, blink, spill) that don't apply to a parked preview. ---------- */
  drawRobotReal(wx, wy, wz){
    const g = this.g;
    this.botX = wx; this.botY = wy; this.botZ = wz;

    const sh = [];
    for(let i=0;i<14;i++){
      const a=(i/14)*Math.PI*2;
      sh.push(this.P(Math.cos(a)*34, Math.sin(a)*30, 0.5));
    }
    this.quadOn(g, sh, SKIN.shadow, 0.16);

    const wheels = [];
    for(const side of [-1, 1]){
      for(const wxi of WHEEL.xs){
        const c = {x:wxi, y:side*WHEEL.side, z:WHEEL.z};
        wheels.push({ c, side, near: this.depth(c.x, c.y, c.z) > this.depth(c.x, -c.y, c.z) });
      }
    }
    for(const w of wheels) if(!w.near) this.drawWheel(w.c, w.side);

    const lidBox = {...LID};
    const lidIsNear = this.lidNear(lidBox);
    if(!lidIsNear) this.drawLid(lidBox);

    this.drawBox({hx:24, hy:17, z0:6, z1:BODY.z0+1}, 0x3f434c, 0x3a3d45, 0x2e3138, false);
    this.drawBox({...BODY}, SKIN.bodyTop, SKIN.bodyRight, SKIN.bodyLeft);
    this.drawBox({hx:BODY.hx+0.6, hy:BODY.hy+0.6, z0:STRIPE.z0, z1:STRIPE.z1},
                 null, SKIN.stripe, SKIN.stripeDk, false, true);

    if(lidIsNear) this.drawLid(lidBox);

    const fn = this.R(1, 0, 0);
    if(fn.x + fn.y + fn.z > 0.3){
      const F = (y, z) => this.P(BODY.hx + 0.8, y, z);
      this.quadOn(g, [F(-13,40), F(13,40), F(13,50), F(-13,50)], SKIN.visor);
      this.edgeOn(g, [F(-13,40), F(13,40), F(13,50), F(-13,50)], SKIN.outline, 1.5);
      for(const ey of [-7, 7]){
        const c = F(ey, 45);
        g.fillStyle(SKIN.eye, 1);
        g.fillEllipse(c.x, c.y, 7, 7);
      }
      this.quadOn(g, [F(-16,18), F(16,18), F(16,22), F(-16,22)], 0xfff3b0);
    }
    for(const w of wheels) if(w.near) this.drawWheel(w.c, w.side);
  }

  /* ---------- real tile system, ported verbatim from drawWorld ---------- */
  drawTiles(ox, oy, rows){
    const g = this.g;
    const dv = DIRV[0], rv = DIRV[1];
    for(let a = -1; a <= rows; a++){
      const rowX = a*T2, rowY = 0;
      for(let c = -1; c <= 4; c++){
        const road = c >= 2;
        const cx = rowX + rv.x*c*T2, cy = rowY + rv.y*c*T2;
        const Ax = dv.x*TILE, Ay = dv.y*TILE, Bx = rv.x*TILE, By = rv.y*TILE;
        const pts = [
          this.Wg(cx+Ax-Bx, cy+Ay-By, 0, ox, oy), this.Wg(cx+Ax+Bx, cy+Ay+By, 0, ox, oy),
          this.Wg(cx-Ax+Bx, cy-Ay+By, 0, ox, oy), this.Wg(cx-Ax-Bx, cy-Ay-By, 0, ox, oy)
        ];
        this.quadg(pts, road ? PAL.road : (((a+c)%2===0) ? PAL.pave : PAL.paveB));
        if(!road) this.edgeg(pts, PAL.paveEdge, 1.5);
        if(c === 3 && a % 2 === 0 && a >= 0 && a < rows){
          this.quadg([
            this.Wg(cx - dv.x*14 - rv.x*4, cy - dv.y*14 - rv.y*4, 0, ox, oy),
            this.Wg(cx + dv.x*14 - rv.x*4, cy + dv.y*14 - rv.y*4, 0, ox, oy),
            this.Wg(cx + dv.x*14 + rv.x*4, cy + dv.y*14 + rv.y*4, 0, ox, oy),
            this.Wg(cx - dv.x*14 + rv.x*4, cy - dv.y*14 + rv.y*4, 0, ox, oy)
          ], PAL.roadLine);
        }
      }
      const kx = rowX + rv.x*TILE*3, ky = rowY + rv.y*TILE*3;
      this.quadg([
        this.Wg(kx - dv.x*TILE, ky - dv.y*TILE, 3, ox, oy), this.Wg(kx + dv.x*TILE, ky + dv.y*TILE, 3, ox, oy),
        this.Wg(kx + dv.x*TILE, ky + dv.y*TILE, -2, ox, oy), this.Wg(kx - dv.x*TILE, ky - dv.y*TILE, -2, ox, oy)
      ], PAL.paveEdge);
    }

    /* CONTINUING ALONG THE ROBOT'S ACTUAL PATH (dx), not sideways:
       after the near sidewalk ends (a=rows) and the ramp takes you
       down to street level, that's now a proper road for a few rows,
       then a SECOND sidewalk beyond it — the far side of the
       intersection the robot would actually walk into if it kept
       going straight. */
    const roadRows = 4;
    for(let a = rows+1; a <= rows+roadRows; a++){
      const rowX = a*T2, rowY = 0;
      for(let c = -1; c <= 4; c++){
        const cx = rowX + rv.x*c*T2, cy = rowY + rv.y*c*T2;
        const Ax = dv.x*TILE, Ay = dv.y*TILE, Bx = rv.x*TILE, By = rv.y*TILE;
        const pts = [
          this.Wg(cx+Ax-Bx, cy+Ay-By, 0, ox, oy), this.Wg(cx+Ax+Bx, cy+Ay+By, 0, ox, oy),
          this.Wg(cx-Ax+Bx, cy-Ay+By, 0, ox, oy), this.Wg(cx-Ax-Bx, cy-Ay-By, 0, ox, oy)
        ];
        this.quadg(pts, PAL.road);
      }
    }
    /* single dashed center line, running the length of the road
       (the dy axis — the direction this cross-street's own traffic
       moves) at the middle of the road's depth (dx) — one line, not
       a mark repeated at every other row along dx. dv/rv are
       axis-aligned in this lab (dv=(1,0), rv=(0,1)), so world-x maps
       straight from the dx position and world-y straight from dy. */
    {
      const centerX = (rows+1)*T2 + (roadRows-1)*T2/2;
      const dashLen = 16, gapLen = 10, halfSpan = 2.5*T2;
      for(let d = -halfSpan; d < halfSpan; d += dashLen+gapLen){
        const d1 = Math.min(d+dashLen, halfSpan);
        this.quadg([
          this.Wg(centerX-2, d, 0, ox, oy), this.Wg(centerX+2, d, 0, ox, oy),
          this.Wg(centerX+2, d1, 0, ox, oy), this.Wg(centerX-2, d1, 0, ox, oy)
        ], PAL.roadLine);
      }
    }

    /* far sidewalk: continues straight ahead past the road. All
       plain pavement here — the c>=2 "road" column rule only applies
       to the near sidewalk's own layout (where the actual road sits
       right beside it); copying that same rule here was wrong, this
       whole section is sidewalk, no road columns within it. */
    const farStart = rows + roadRows + 1;
    for(let a = farStart; a <= farStart + 4; a++){
      const rowX = a*T2, rowY = 0;
      for(let c = -1; c <= 4; c++){
        const cx = rowX + rv.x*c*T2, cy = rowY + rv.y*c*T2;
        const Ax = dv.x*TILE, Ay = dv.y*TILE, Bx = rv.x*TILE, By = rv.y*TILE;
        const pts = [
          this.Wg(cx+Ax-Bx, cy+Ay-By, 0, ox, oy), this.Wg(cx+Ax+Bx, cy+Ay+By, 0, ox, oy),
          this.Wg(cx-Ax+Bx, cy-Ay+By, 0, ox, oy), this.Wg(cx-Ax-Bx, cy-Ay-By, 0, ox, oy)
        ];
        this.quadg(pts, ((a+c)%2===0) ? PAL.pave : PAL.paveB);
        this.edgeg(pts, PAL.paveEdge, 1.5);
      }
      /* curb lip at the road/far-sidewalk boundary — small repeated
         segments across the width, same scale as the near sidewalk's
         own curb (which repeats ~46-unit segments along its length).
         One giant quad spanning the full width read as a solid
         raised block, not a curb — this matches the actual visual
         density instead. */
      if(a === farStart){
        const kx = rowX - dv.x*TILE, ky = rowY - dv.y*TILE;
        for(const c of [-1, 0, 1]){
          const sx = kx + rv.x*c*T2, sy = ky + rv.y*c*T2;
          this.quadg([
            this.Wg(sx - rv.x*TILE, sy - rv.y*TILE, 3, ox, oy),
            this.Wg(sx + rv.x*TILE, sy + rv.y*TILE, 3, ox, oy),
            this.Wg(sx + rv.x*TILE, sy + rv.y*TILE, -2, ox, oy),
            this.Wg(sx - rv.x*TILE, sy - rv.y*TILE, -2, ox, oy)
          ], PAL.paveEdge);
        }
      }
    }
  }

  worldOf(s, row){
    const dv = DIRV[0], rv = DIRV[1];
    return { x: s*T2*dv.x + rv.x*row*T2, y: s*T2*dv.y + rv.y*row*T2 };
  }

  /* ground height under the robot's own feet — this is the missing
     piece that made the outer lanes look wrong. The ramp only
     exists in the center lane (row 0); the outer lanes are just
     flat sidewalk with a real curb at the end, no graceful ramp
     down. In the center lane the descent spans BOTH ramp tiles —
     it starts heading downhill the moment you hit the first one,
     not just within the yellow tile — reaching street level by the
     yellow tile's far edge, staying at street level across the
     road, then crossing the far ramp's yellow tile FLAT (real curb
     ramps land the tactile pad on flat ground, not the slope) before
     climbing entirely on the second tile, up onto the far sidewalk.
     Outer lanes hold flat sidewalk height right up until the near
     sidewalk literally ends, then drop straight to street level and
     just stay there — no ramp ever brings them back up, same as
     real curbs outside the marked crossing. */
  groundZAt(s, row){
    const sidewalkZ = 2, streetZ = -3;
    const worldX = s*T2;
    const rampAbsLo = DRIVE.s*T2 - T2;       // near ramp: first tile's near edge
    const rampAbsMid = DRIVE.s*T2;            // near ramp: slope ends, yellow (flat) tile begins
    const rampAbsHi = DRIVE.s*T2 + T2;       // near ramp: yellow tile's far edge
    const farAbsMid = 9.5*T2;                // far ramp: yellow tile ends, climb tile begins
    const farAbsHi = 9.5*T2 + T2;            // far ramp: climb tile's far edge (sidewalk side)
    if(row === 0){
      if(worldX <= rampAbsLo) return sidewalkZ;
      if(worldX < rampAbsMid){
        const v = (worldX - rampAbsLo) / (rampAbsMid - rampAbsLo);
        return sidewalkZ + (streetZ - sidewalkZ) * v;
      }
      if(worldX < rampAbsHi) return streetZ;    // yellow tile: flat landing, matches the pad
      if(worldX <= farAbsMid) return streetZ;   // road, then flat across the yellow tile
      if(worldX < farAbsHi){
        const v = (worldX - farAbsMid) / (farAbsHi - farAbsMid);
        return streetZ + (sidewalkZ - streetZ) * v;
      }
      return sidewalkZ;
    }
    return worldX < rampAbsHi ? sidewalkZ : streetZ;
  }

  /* same pattern as the game's own groundSlope(s): a small forward/
     back sample either side of the current position, rise over run.
     Feeds this.pitch the same way the game does — nose down when
     heading downhill, nose up on the way back up. This was the
     missing half: roll (cross-slope, side to side) was wired up,
     but pitch (the slope you're actually walking, fore-aft) never
     was, so it never visually leaned into the hill at all. */
  groundSlopeAt(s, row){
    const dS = 0.15;
    const zA = this.groundZAt(s - dS, row), zB = this.groundZAt(s + dS, row);
    return (zB - zA) / (2*dS*T2);
  }

  drawDrivewayOld(ox, oy, wx, wy){
    const g = this.g;
    const W = (dx, dy, dz) => this.Wg(wx+dx, wy+dy, dz, ox, oy);
    this.quadg([W(-34,-TILE,2), W(34,-TILE,2), W(46,TILE+14,-3), W(-46,TILE+14,-3)], 0xb5afa2);
    this.edgeg([W(-34,-TILE,2), W(34,-TILE,2), W(46,TILE+14,-3), W(-46,TILE+14,-3)], 0x968f81, 2);
    g.lineStyle(1.5, 0x968f81, 1);
    for(const lx of [-18, 0, 18]){
      const a=W(lx,-TILE,2), b=W(lx*1.35, TILE+14,-3);
      g.lineBetween(a.x, a.y, b.x, b.y);
    }
  }

  /* ---------- descending ramp: near sidewalk down to the road ----------
     Tile 1 (closer to the sidewalk) is the running slope, sidewalk
     height down to street height. Tile 2 is the flat landing at
     street height, with the ADA pad on it — real curb ramps put the
     detectable warning pad on level ground, not on the active slope. */
  drawRampDown(ox, oy, wx, wy, seed){
    const g = this.g, D = DRIVE;
    const rng = mulberry32(seed);
    const mat = D[D.material];
    const W = (dx, dy, dz) => this.Wg(wx+dx, wy+dy, dz, ox, oy);

    const crossHalf = 1.5*T2, wHalf = D.width;
    const sidewalkZ = 2, streetZ = -3;
    const tileLo = -T2, tileMid = 0, tileHi = T2;
    const padDyLo = -T2/2, padDyHi = T2/2;

    this.drawRampApron(W, g, rng, mat, D, crossHalf, wHalf);

    /* tile 1: slope down. tile 2: flat landing at street height. */
    const zLo = sidewalkZ, zMid = streetZ, zHi = streetZ;
    const stripSeg1 = [
      W(tileLo, padDyLo, zLo), W(tileMid, padDyLo, zMid),
      W(tileMid, padDyHi, zMid), W(tileLo, padDyHi, zLo)
    ];
    const stripSeg2 = [
      W(tileMid, padDyLo, zMid), W(tileHi, padDyLo, zHi),
      W(tileHi, padDyHi, zHi), W(tileMid, padDyHi, zMid)
    ];
    this.quadg(stripSeg1, mat.base); this.edgeg(stripSeg1, mat.baseDk, 1.5);
    this.quadg(stripSeg2, mat.base); this.edgeg(stripSeg2, mat.baseDk, 1.5);

    const wallCol = mat.baseDk;
    for(const py of [padDyLo, padDyHi]){
      this.quadg([W(tileLo, py, sidewalkZ), W(tileMid, py, sidewalkZ), W(tileMid, py, zMid), W(tileLo, py, zLo)], wallCol, 0.8);
      this.quadg([W(tileMid, py, sidewalkZ), W(tileHi, py, sidewalkZ), W(tileHi, py, zHi), W(tileMid, py, zMid)], wallCol, 0.8);
    }

    /* pad sits on tile 2 — the flat landing, street-facing end */
    this.drawRampPad(W, g, tileMid, tileHi, padDyLo, padDyHi, streetZ, streetZ);
  }

  /* ---------- ascending ramp: road up to the far sidewalk ----------
     Mirror layout of the descending ramp: tile 1 (closer to the
     road) is the flat landing with the pad, tile 2 is the running
     slope up to sidewalk height. Built independently, not by
     flipping the descending ramp's numbers — that approach is what
     kept producing mismatches. */
  drawRampUp(ox, oy, wx, wy, seed){
    const g = this.g, D = DRIVE;
    const rng = mulberry32(seed);
    const mat = D[D.material];
    const W = (dx, dy, dz) => this.Wg(wx+dx, wy+dy, dz, ox, oy);

    const crossHalf = 1.5*T2, wHalf = D.width;
    const sidewalkZ = 2, streetZ = -3;
    const tileLo = -T2, tileMid = 0, tileHi = T2;
    const padDyLo = -T2/2, padDyHi = T2/2;

    this.drawRampApron(W, g, rng, mat, D, crossHalf, wHalf);

    /* tile 1: flat landing at street height. tile 2: slope up. */
    const zLo = streetZ, zMid = streetZ, zHi = sidewalkZ;
    const stripSeg1 = [
      W(tileLo, padDyLo, zLo), W(tileMid, padDyLo, zMid),
      W(tileMid, padDyHi, zMid), W(tileLo, padDyHi, zLo)
    ];
    const stripSeg2 = [
      W(tileMid, padDyLo, zMid), W(tileHi, padDyLo, zHi),
      W(tileHi, padDyHi, zHi), W(tileMid, padDyHi, zMid)
    ];
    this.quadg(stripSeg1, mat.base); this.edgeg(stripSeg1, mat.baseDk, 1.5);
    this.quadg(stripSeg2, mat.base); this.edgeg(stripSeg2, mat.baseDk, 1.5);

    const wallCol = mat.baseDk;
    for(const py of [padDyLo, padDyHi]){
      this.quadg([W(tileLo, py, sidewalkZ), W(tileMid, py, sidewalkZ), W(tileMid, py, zMid), W(tileLo, py, zLo)], wallCol, 0.8);
      this.quadg([W(tileMid, py, sidewalkZ), W(tileHi, py, sidewalkZ), W(tileHi, py, zHi), W(tileMid, py, zMid)], wallCol, 0.8);
    }

    /* pad sits on tile 1 — the flat landing, street-facing end */
    this.drawRampPad(W, g, tileLo, tileMid, padDyLo, padDyHi, streetZ, streetZ);
  }

  /* shared: the flat apron + expansion joints + weathering stains,
     identical for both ramps since neither one touches this part */
  drawRampApron(W, g, rng, mat, D, crossHalf, wHalf){
    const apron = [
      W(-wHalf, -crossHalf, 2), W(wHalf, -crossHalf, 2),
      W(wHalf, crossHalf, 2), W(-wHalf, crossHalf, 2)
    ];
    this.quadg(apron, mat.base);
    this.edgeg(apron, mat.baseDk, 2);

    g.lineStyle(1.5, mat.joint, 0.9);
    for(const u of [-0.62, 0, 0.62]){
      const a2 = W(wHalf*u, -crossHalf, 2);
      const b2 = W(wHalf*u, crossHalf, 2);
      g.lineBetween(a2.x, a2.y, b2.x, b2.y);
    }

    for(let i=0; i<D.wear; i++){
      const u = rng()*2 - 1, v = rng();
      const py = -crossHalf + (2*crossHalf)*v;
      const px = wHalf*u*0.7;
      const p = W(px, py, 2);
      g.fillStyle(mat.stain, 0.14 + rng()*0.1);
      g.fillEllipse(p.x, p.y, (10+rng()*10)*this.K*0.4, (5+rng()*5)*this.K*0.4);
    }
  }

  /* shared: the ADA pad — takes the exact tile (dxLo..dxHi) it sits
     on and the flat z it should hold there, since it's always level */
  drawRampPad(W, g, dxLo, dxHi, dyLo, dyHi, zLo, zHi){
    const zAtDx = dx => zLo + (zHi-zLo) * ((dx-dxLo)/(dxHi-dxLo));
    const padRect = [
      W(dxLo, dyLo, zLo), W(dxLo, dyHi, zLo),
      W(dxHi, dyHi, zHi), W(dxHi, dyLo, zHi)
    ];
    this.quadg(padRect, 0xf4c430);
    this.edgeg(padRect, 0xb9911f, 1.5);
    const rows = 5, cols = 5;
    for(let ri=0; ri<rows; ri++){
      for(let ci=0; ci<cols; ci++){
        const vY = ri/(rows-1), vX = ci/(cols-1);
        const py = dyLo + (dyHi-dyLo)*vY;
        const px = dxLo + (dxHi-dxLo)*vX;
        const pz = zAtDx(px) - 0.05;
        const p = W(px, py, pz);
        g.fillStyle(0xc9911f, 0.8);
        g.fillCircle(p.x, p.y, 1.5*this.K*0.4);
        const hi = W(px - 0.6, py - 0.6, pz + 0.1);
        g.fillStyle(0xffe27a, 0.9);
        g.fillCircle(hi.x, hi.y, 0.8*this.K*0.4);
      }
    }
  }

  update(time, delta){
    const g = this.g; g.clear();
    g.fillStyle(PAL.sky, 1);
    g.fillRect(0, 0, this.scale.gameSize.width, this.scale.gameSize.height);

    /* DRIVE: advance botS at a fixed walking speed, same units the
       real hazard-distance check uses (world units, via T2 — the
       lab's own botS is in tile-multiples, so convert speed into
       that scale: this.speed is in world-units/ms, so ds/dt =
       speed/T2). Ramp physics matches the game's actual formula —
       this.tilt += this.speed * 0.055 * dt — while within 44 world
       units of the ramp's own along-travel extent, converted the
       same way. This is the exact mechanism that'll get ported and
       tuned next pass; right now it's here to SEE it, not to be the
       final numbers. */
    const dt = Math.min(delta || 16.7, 50);
    if(this.driving && this.state !== "tipped"){
      /* the far curb (where the second sidewalk begins) is a real
         wall for the outer lanes — no ramp there, so no way up.
         Same idea as the game's palm-tree blocking: stop forward
         motion right at the curb and ramp up stuckAmt instead of
         just letting the robot walk through at street level like it
         was doing before. Center lane is unaffected — it has the
         ramp, so it's never blocked here. */
      const curbBoundary = 8.5*T2;   // where the far sidewalk starts — see groundZAt's farAbsLo
      const wouldCrossCurb = this.botRow !== 0 && this.botS*T2 + this.speed*dt >= curbBoundary;
      this.isBlocked = this.botRow !== 0 && this.botS*T2 >= curbBoundary - 1;

      if(wouldCrossCurb){
        this.botS = curbBoundary / T2;
        this.stuckAmt = Math.min(1, (this.stuckAmt || 0) + dt/500);
      } else {
        this.botS += (this.speed / T2) * dt;
        this.stuckAmt = Math.max(0, (this.stuckAmt || 0) - dt/500);
      }
      this.wheelPhase += this.speed * dt * 0.28;
      const botWorldX = this.botS * T2;
      /* two ramps now — near one at DRIVE.s, far one at 9.5 (see the
         far-ramp positioning note near where it's drawn). Physics
         needs to check proximity to BOTH; before this only ever
         checked the near one, so the far ramp had correct height
         (groundZAt already knew about it) but zero tilt physics. */
      const dxNear = botWorldX - DRIVE.s*T2;
      const dxFar = botWorldX - 9.5*T2;
      const onNearRamp = Math.abs(dxNear) < DRIVE.width;
      const onFarRamp = Math.abs(dxFar) < DRIVE.width;
      /* the cross-slope only actually tilts you sideways if you're
         standing somewhere the ground isn't flat laterally — the
         center lane sits on the pad's straight-down slope (pure
         pitch, no side-to-side lean), while the two outer lanes are
         off to the side of it, so they'd pick up an actual roll —
         and it's the mirror image on each side, not the same lean
         twice. botRow (-1/0/1) already IS that sign. */
      if(onNearRamp || onFarRamp) this.tilt += this.botRow * this.speed * 0.055 * dt;
      this.roll = Phaser.Math.Clamp(this.tilt, -1, 1) * 0.5;

      /* ground height: smooth ramp slope in the center lane, but a
         real drop in the outer lanes once the sidewalk actually
         ends — there's no ramp under them, just a curb. A sudden
         kick on the frame it happens, same idea as how the game
         gives hard hazards a kick, so it reads as falling off an
         edge instead of just sinking smoothly. If it was ALREADY
         leaning hard from the cross-slope when it hits that drop,
         the combination is enough to actually tip it — same idea
         works for either side, whichever way the existing lean
         already pointed. */
      const prevZ = this.botZ !== undefined ? this.botZ : 2;
      this.botZ = this.groundZAt(this.botS, this.botRow);
      const droppedOffCurb = this.botRow !== 0 && prevZ - this.botZ > 1;
      if(droppedOffCurb){
        const wasAlreadyLeaning = Math.abs(this.tilt) > 0.55;
        this.tilt += Math.sign(this.tilt || this.botRow) * 0.35;
        if(wasAlreadyLeaning || Math.abs(this.tilt) > 0.85){
          this.state = "tipped";
          this.tipDir = this.tilt >= 0 ? 1 : -1;
          this.tipT = 0;
        }
      }

      /* pitch: nose down heading downhill, same formula the game
         uses (this.pitch = -atan(groundSlope)) — this was the
         missing half. Skipped mid-tip and right on a curb-drop
         frame, same as the game only applies it in normal driving
         state. */
      if(this.state !== "tipped" && !droppedOffCurb){
        this.pitch = -Math.atan(this.groundSlopeAt(this.botS, this.botRow));
      }

      /* jitter: crossing the yellow pad means rolling over the
         truncated-dome bumps, not a smooth surface — small random
         wobble layered on top of the slope's own roll, not folded
         into this.tilt itself so it doesn't affect the tip-over
         threshold or persist once off the pad. */
      /* near ramp's pad is the far tile (0 to T2 past DRIVE.s);
         far ramp's pad is the near tile (-T2 to 0 past 9.5), since
         that ramp is inverted and the pad always sits on whichever
         tile actually touches the street. */
      const onNearPad = this.botRow === 0 && botWorldX >= DRIVE.s*T2 && botWorldX <= DRIVE.s*T2 + T2;
      const onFarPad = this.botRow === 0 && botWorldX >= 9.5*T2 - T2 && botWorldX <= 9.5*T2;
      this.jitterRoll = (onNearPad || onFarPad) ? (Math.random()-0.5) * 0.1 : 0;
      this.roll += this.jitterRoll;

      if(this.botS > 14){ this.botS = 0; this.tilt = 0; this.roll = 0; this.botZ = 2; this.pitch = 0; this.stuckAmt = 0; this.isBlocked = false; }
    }

    /* tipped-state rollover: same formula the game uses
       (this.roll = tipDir * (PI/2) * tipT), plays out independent of
       the driving toggle so it actually finishes instead of freezing
       mid-animation, then resets automatically so DRIVE can be
       tested again without manual cleanup. */
    if(this.state === "tipped"){
      this.tipT = Math.min(1, this.tipT + dt/900);
      this.roll = this.tipDir * (Math.PI*0.5) * this.tipT;
      if(this.tipT >= 1){
        this.tipResetT = (this.tipResetT || 0) + dt;
        if(this.tipResetT > 1400){
          this.state = "idle"; this.tipT = 0; this.tipResetT = 0;
          this.botS = 0; this.tilt = 0; this.roll = 0; this.botZ = 2; this.pitch = 0; this.stuckAmt = 0; this.isBlocked = false;
        }
      }
    }
    if(this.botZ === undefined) this.botZ = this.groundZAt(this.botS, this.botRow);

    /* camera follows the robot, same convention as the real game
       (camX/camY track botX/botY with a forward lead so there's
       more visible road ahead than behind) — was fixed at 0 before,
       which meant the robot just walked off-frame as botS grew.
       Set BEFORE drawing anything, so tiles/driveway/robot all use
       the same camera position this frame instead of lagging a
       frame behind. */
    const bwp = this.worldOf(this.botS, this.botRow);
    const dv = DIRV[0];
    this.camX = bwp.x + dv.x*60;
    this.camY = bwp.y + dv.y*60;
    this.camZ = 0;

    this.drawTiles(this.cx, this.cy, 4);

    const dwp = this.worldOf(DRIVE.s, DRIVE.row);
    /* far ramp sits where the far sidewalk begins: drawTiles uses
       rows=4 (near sidewalk) + roadRows=4 (road) before the far
       sidewalk starts at a=9 — s=9.5 combines its first two tiles,
       same "X.5 spans tiles X and X+1" convention as the near ramp. */
    const dwpFar = this.worldOf(9.5, DRIVE.row);
    if(this.mode === "old"){
      this.drawDrivewayOld(this.cx, this.cy, dwp.x, dwp.y);
    } else {
      /* two independently-built ramps, not one function pretending
         to be both — different seed so their wear doesn't match. */
      this.drawRampDown(this.cx, this.cy, dwp.x, dwp.y, this.seed);
      this.drawRampUp(this.cx, this.cy, dwpFar.x, dwpFar.y, this.seed + 1);
    }

    let drawX = bwp.x, drawY = bwp.y;
    if(this.stuckAmt > 0.05){
      drawX += (Math.random()-0.5) * 2.6 * this.stuckAmt;
      drawY += (Math.random()-0.5) * 1.4 * this.stuckAmt;
    }
    this.drawRobotReal(drawX, drawY, this.botZ);
    if(this.stuckAmt > 0.5){
      const qp = this.W(drawX + 42, drawY - 130, 0);
      this.g.fillStyle(0xffffff, this.stuckAmt);
      this.g.fillCircle(qp.x, qp.y, 14);
      this.g.lineStyle(2, 0x30343d, this.stuckAmt);
      this.g.strokeCircle(qp.x, qp.y, 14);
    }
    if(this.driving || this.state === "tipped") this.updateVals();
  }
}

const game = new Phaser.Game({
  type: Phaser.AUTO, parent: "game",
  scale: { mode: Phaser.Scale.RESIZE, width: "100%", height: "100%" },
  scene: [SidewalkEndLab]
});
const scn = () => game.scene.getScene("sidewalkendlab");

document.getElementById("oldBtn").addEventListener("click", e => {
  scn().mode = "old";
  e.target.classList.add("on");
  document.getElementById("newBtn").classList.remove("on");
});
document.getElementById("newBtn").addEventListener("click", e => {
  scn().mode = "new";
  e.target.classList.add("on");
  document.getElementById("oldBtn").classList.remove("on");
});
document.getElementById("matBtn").addEventListener("click", e => {
  DRIVE.material = DRIVE.material === "concrete" ? "asphalt" : "concrete";
  e.target.textContent = DRIVE.material.toUpperCase();
  scn().updateVals();
});
document.getElementById("driveBtn").addEventListener("click", e => {
  const s = scn();
  s.driving = !s.driving;
  e.target.classList.toggle("on", s.driving);
});
document.getElementById("reseed").addEventListener("click", () => {
  scn().seed = Math.floor(Math.random()*99999);
});
document.getElementById("zoomIn").addEventListener("click", () => { scn().K = Math.min(scn().K + 0.4, 6); });
document.getElementById("zoomOut").addEventListener("click", () => { scn().K = Math.max(scn().K - 0.4, 1.2); });
document.getElementById("botBack").addEventListener("click", () => { const s=scn(); s.botS = Math.max(0, s.botS - 0.5); s.botZ = s.groundZAt(s.botS, s.botRow); s.updateVals(); });
document.getElementById("botFwd").addEventListener("click", () => { const s=scn(); s.botS = Math.min(14, s.botS + 0.5); s.botZ = s.groundZAt(s.botS, s.botRow); s.updateVals(); });
document.getElementById("rowDown").addEventListener("click", () => { const s=scn(); s.botRow = Math.max(-1, s.botRow - 1); s.botZ = s.groundZAt(s.botS, s.botRow); s.updateVals(); });
document.getElementById("rowUp").addEventListener("click", () => { const s=scn(); s.botRow = Math.min(1, s.botRow + 1); s.botZ = s.groundZAt(s.botS, s.botRow); s.updateVals(); });
document.querySelectorAll("[data-p]").forEach(btn => {
  btn.addEventListener("click", () => {
    const p = btn.dataset.p, d = +btn.dataset.d;
    if(p === "width") DRIVE.width = Phaser.Math.Clamp(DRIVE.width + d*6, 46, 138);
    if(p === "wear")  DRIVE.wear  = Phaser.Math.Clamp(DRIVE.wear + d*1, 0, 6);
    scn().updateVals();
  });
});
</script>
</body>
</html>
