/* ============================================================

   Every named asset from docs/ASSETS.md, rendered live by the
   SAME draw code as game/index.html. When an asset changes in
   the game, port the function here in the same commit so this
   page never lies. Drag / wheel to scroll.
   ============================================================ */

/* approved in hydrant lab: height 20 · base 8 · dome 6.5 · nozzle 2.6 · red.
   hydrantBurst is the same rigid hydrant with a sheared front nozzle,

  cap: 0xb5342b, capDk: 0x8a2822,
  nut: 0x3a3d43,
  water: 0xbfe6f2, waterDk: 0x8fc8dc,
  shadow: 0x000000
};
function convexHull(pts){
  const P2 = pts.slice().sort((a,b) => a.x - b.x || a.y - b.y);
  const cross = (o, a, b) => (a.x-o.x)*(b.y-o.y) - (a.y-o.y)*(b.x-o.x);
  const lo = [], hi = [];
  for(const p of P2){
    while(lo.length >= 2 && cross(lo[lo.length-2], lo[lo.length-1], p) <= 0) lo.pop();
    lo.push(p);
  }
  for(let i = P2.length-1; i >= 0; i--){
    const p = P2[i];
    while(hi.length >= 2 && cross(hi[hi.length-2], hi[hi.length-1], p) <= 0) hi.pop();
    hi.push(p);
  }
  lo.pop(); hi.pop();
  return lo.concat(hi);
}
function mulberry32(a){ return function(){ a |= 0; a = (a + 0x6D2B79F5) | 0; let t = Math.imul(a ^ (a >>> 15), 1 | a); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; }; }

const TILE = 46;
const BODY = { hx:26, hy:20, z0:14, z1:54 };
const LID  = { hx:22, hy:16, z0:54, z1:61 };
const STRIPE = { z0:20, z1:27 };
const WHEEL = { r:10, z:10, xs:[-16, 0, 16], side:22 };
const FLAG = { base:{x:-21, y:13}, z0:61, z1:104 };

/* district palettes shown on the world cards */
const PALETTES = {
  "default": { sky:0x9fd4e8, pave:0xc9c3b4, paveB:0xbfb9aa, paveEdge:0xa8a294, road:0x4a4d55, roadLine:0xd8d2c2 },
  "hills":   { sky:0xf2c48d, pave:0xbdb6a8, paveB:0xb3ac9e, paveEdge:0x9c9588, road:0x45484f, roadLine:0xcfc9b9 },
  "rough":   { sky:0xc9b49b, pave:0xa19a8e, paveB:0x958e82, paveEdge:0x7d7669, road:0x3d4046, roadLine:0x8f897b }
};

class GalleryScene extends Phaser.Scene {
  constructor(){ super("gallery"); }

  create(){
    this.K = 1.6;
    this.f = 0; this.yaw = 0; this.pitch = 0; this.roll = 0;
    this.ox = 0; this.oy = 0;
    this.wheelPhase = 0; this.flagLean = 0; this.tipT = 0; this.lidAng = 0;
    this.blinkT = 0;
    this.d = PALETTES["default"];

    this.g = this.add.graphics();
    this.buildLayout();

    /* scroll: drag + wheel */
    this.scrollY = 0;
    let dragY = null, dragS = 0;
    this.input.on("pointerdown", p => { dragY = p.y; dragS = this.scrollY; });
    this.input.on("pointermove", p => {
      if(dragY === null || !p.isDown) return;
      this.scrollY = Phaser.Math.Clamp(dragS - (p.y - dragY), 0, this.maxScroll);
    });
    this.input.on("pointerup", () => { dragY = null; });
    this.input.on("wheel", (p, o, dx, dy) => {
      this.scrollY = Phaser.Math.Clamp(this.scrollY + dy*0.6, 0, this.maxScroll);
    });
  }

  /* ---------- layout ---------- */
  buildLayout(){
    const W = this.scale.gameSize.width;
    const M = 10, GAP = 10;
    const colW = (W - M*2 - GAP) / 2;
    this.cards = [];
    let y = 12;

    const header = (txt) => {
      this.add.text(M, y, txt, { fontSize:"13px", fontStyle:"bold", color:"#ff9c4d",
        letterSpacing:2 }).setText(txt.toUpperCase());
      y += 30;
    };
    const sub = (txt) => {
      this.add.text(M, y, txt, { fontSize:"11px", color:"#8f95a1" });
      y += 22;
    };
    let col = 0;
    const card = (id, h, draw, wide=false) => {
      if(wide && col === 1){ col = 0; y += this.lastH + GAP; }
      const w = wide ? colW*2 + GAP : colW;
      const x = M + (wide ? 0 : col*(colW + GAP));
      this.cards.push({ id, x, y, w, h, draw });
      this.add.text(x + 8, y + h - 20, id, { fontSize:"11px", color:"#8f95a1" });
      if(wide){ y += h + GAP; col = 0; }
      else if(col === 0){ col = 1; this.lastH = h; }
      else { col = 0; y += Math.max(h, this.lastH) + GAP; }
      this.lastH = h;
    };
    const flushRow = () => { if(col === 1){ col = 0; y += this.lastH + GAP; } };

    this.add.text(M, y, "TIPSY · LIVE ASSET GALLERY", { fontSize:"17px", fontStyle:"bold", color:"#e8eaef" });
    y += 24;
    this.add.text(M, y, "drag to scroll · drawn by the game's own code · see docs/ASSETS.md", { fontSize:"11px", color:"#8f95a1" });
    y += 28;

    /* ---- ROBOT ---- */
    header("1 · Robot — Tipsy");
    card("robot.full (idle)", 230, (t) => this.drawRobotComposite(t, { K:1.7, dy:60 }), true);
    card("robot.tipped + cargo spill", 230, (t) => this.drawRobotComposite(t, { K:1.5, dy:70, tipped:true }), true);
    card("robot.wheel", 150, (t) => {
      this.setPose({ K:4, dy:40 });
      this.wheelPhase = t*0.004;
      this.drawWheel({x:0, y:0, z:WHEEL.z}, 1);
    });
    card("robot.skirt", 150, () => {
      this.setPose({ K:2.6, dy:30 });
      this.drawBox({hx:24, hy:17, z0:6, z1:BODY.z0+1}, 0x3f434c, 0x3a3d45, 0x2e3138, false);
    });
    card("robot.body", 170, () => {
      this.setPose({ K:1.9, dy:55 });
      this.drawBox(BODY, SKIN.bodyTop, SKIN.bodyRight, SKIN.bodyLeft);
    });
    card("robot.stripe (decal)", 170, () => {
      this.setPose({ K:1.9, dy:55 });
      this.drawBox(BODY, SKIN.bodyTop, SKIN.bodyRight, SKIN.bodyLeft);
      this.drawBox({hx:BODY.hx+0.6, hy:BODY.hy+0.6, z0:STRIPE.z0, z1:STRIPE.z1},
                   null, SKIN.stripe, SKIN.stripeDk, false, true);
    });
    card("robot.lid (closed)", 150, () => {
      this.setPose({ K:2.6, dy:75 });
      this.lidAng = 0;
      this.drawLid(LID);
    });
    card("robot.cavity + lid open", 150, () => {
      this.setPose({ K:2.2, dy:70 });
      this.lidAng = 2.35;
      const ring = (hx, hy) => [
        this.P(hx,-hy,LID.z0+0.5), this.P(hx,hy,LID.z0+0.5),
        this.P(-hx,hy,LID.z0+0.5), this.P(-hx,-hy,LID.z0+0.5)];
      this.quadOn(this.g, ring(LID.hx-2, LID.hy-2), SKIN.cavityWall);
      this.quadOn(this.g, ring(LID.hx-6, LID.hy-6), SKIN.cavityFloor);
      this.drawLid(LID);
      this.lidAng = 0;
    });
    card("robot.visor / eye ×3 / headlight", 150, (t) => this.drawFaceCard(t), true);
    card("robot.flag", 190, (t) => {
      this.setPose({ K:2.0, dy:85 });
      this.flagLean = Math.sin(t*0.002)*0.3;
      this.drawFlag(0);
    });
    card("robot.shadow", 190, () => {
      this.setPose({ K:2.2, dy:20 });
      const sh = [];
      for(let i=0;i<14;i++){
        const a=(i/14)*Math.PI*2;
        sh.push(this.P(Math.cos(a)*34, Math.sin(a)*30, 0.5));
      }
      this.quadOn(this.g, sh, SKIN.shadow, 0.16);
    });
    flushRow();

    /* ---- CARGO ---- */
    header("2 · Cargo (the spill)");
    card("cargo.burrito", 120, () => this.drawBurrito(0, 8));
    card("cargo.cup + puddle", 120, () => this.drawCup(0, 4, true));
    card("cargo.fry ×3", 120, (t) => {
      for(let i=0;i<3;i++) this.drawFry(-26 + i*26, 6, i*1.1);
    });
    flushRow();

    /* ---- WORLD ---- */
    header("3 · World");
    sub("palette follows the day's district — default shown");
    card("world.tile.sidewalk", 160, () => this.drawTileCard(false));
    card("world.tile.road + dash", 160, () => this.drawTileCard(true));
    card("world.curb", 130, () => {
      this.setPose({ K:1.7, dy:10 });
      this.quadOn(this.g, [
        this.W(-TILE*1.6, 0, 3), this.W(TILE*1.6, 0, 3),
        this.W(TILE*1.6, 0, -2), this.W(-TILE*1.6, 0, -2)
      ], this.d.paveEdge);
    });
    card("world.door + knob + mat", 170, () => {
      this.setPose({ K:1.5, dy:40 });
      const door = this.W(0, -TILE-6, 0);
      const g = this.g;
      g.fillStyle(0x5a3d2b, 1); g.fillRect(door.x-22, door.y-96, 44, 96);
      g.fillStyle(0xd8b23a, 1); g.fillCircle(door.x+12, door.y-46, 4);
      this.quadOn(g, [
        this.W(-34, -8, 0.6), this.W(34, -8, 0.6),
        this.W(34, TILE+18, 0.6), this.W(-34, TILE+18, 0.6)
      ], 0xc2452e);
    });
    card("world.palettes (default / hills / rough)", 150, () => this.drawPaletteRows(), true);

    /* ---- PROPS ---- */
    header("4 · Hazards & props");
    const P = (kind, h=150, wide=false, dy=30) =>
      card("prop." + kind, h, (t) => {
        this.setPose({ K:1.8, dy });
        this.drawProp(this.g, kind, 0, 0, t);
      }, wide);
    P("palm", 340, true, 150);
    P("palmDwarf", 190, false, 60);
    P("scooter", 200, false, 45);
    P("scooterStanding", 230, false, 75);
    P("trash");
    P("cone", 190, false, 60);
    P("coneTipped", 150, false, 45);
    P("hydrant", 150, false, 45);
    P("hydrantBurst", 170, false, 60);
    P("planter");
    P("dog");
    P("bin", 190, false, 60);
    P("binKnocked", 150, false, 40);
    P("car", 170, true, 40);
    P("driveway", 170, true, 40);
    P("crack", 120);
    flushRow();

    /* ---- HUD ---- */
    header("5 · HUD");
    card("hud.progress", 110, (t) => this.drawProgressCard(t), true);
    card("hud.tiltMeter", 150, (t) => this.drawTiltCard(t), true);

    /* ---- PALETTE ---- */
    header("6 · Palette master (SKIN)");
    card("SKIN swatches", 330, () => this.drawSwatches(), true);

    this.totalH = y + 60;
    this.maxScroll = Math.max(0, this.totalH - this.scale.gameSize.height);
  }

  /* ---------- pose + projection ---------- */
  setPose(o = {}){
    this.K = o.K ?? 1.6;
    this.f = 0; this.yaw = 0; this.pitch = 0;
    this.roll = o.roll ?? 0;
    this.oy = this.cardCY + (o.dy ?? 0);
    this.ox = this.cardCX;
  }
  T(x, y, z){
    if(this.yaw !== 0){
      const c = Math.cos(this.yaw), s = Math.sin(this.yaw);
      const x2 = x*c - y*s; y = x*s + y*c; x = x2;
    }
    if(this.pitch !== 0){
      const c = Math.cos(this.pitch), s = Math.sin(this.pitch);
      const x2 = x*c - z*s; z = x*s + z*c; x = x2;
    }
    if(this.roll !== 0){
      const PIV = this.roll >= 0 ? 22 : -22;
      const y0 = y + PIV, c = Math.cos(this.roll), s = Math.sin(this.roll);
      y = -PIV + y0*c - z*s; z = y0*s + z*c;
    }
    let rx = x, ry = y;
    for(let i=0; i<this.f; i++){ const t = rx; rx = -ry; ry = t; }
    return { x:rx, y:ry, z };
  }
  R(nx, ny, nz){
    if(this.yaw !== 0){
      const cy = Math.cos(this.yaw), sy = Math.sin(this.yaw);
      const nx2 = nx*cy - ny*sy; ny = nx*sy + ny*cy; nx = nx2;
    }
    if(this.pitch !== 0){
      const c = Math.cos(this.pitch), s = Math.sin(this.pitch);
      const nx2 = nx*c - nz*s; nz = nx*s + nz*c; nx = nx2;
    }
    const c = Math.cos(this.roll), s = Math.sin(this.roll);
    const ny2 = ny*c - nz*s, nz2 = ny*s + nz*c;
    let rx = nx, ry = ny2;
    for(let i=0; i<this.f; i++){ const t = rx; rx = -ry; ry = t; }
    return { x:rx, y:ry, z:nz2 };
  }
  P(x, y, z){
    const q = this.T(x, y, z);
    return { x:(q.x - q.y)*this.K + this.ox, y:((q.x + q.y)*0.5 - q.z)*this.K + this.oy };
  }
  W(x, y, z){
    return { x:(x - y)*this.K + this.ox, y:((x + y)*0.5 - z)*this.K + this.oy };
  }
  depth(x, y, z){
    const q = this.T(x, y, z);
    return q.x + q.y + q.z*0.4;
  }
  groundZ(){ return 0; }
  quadOn(g, pts, color, alpha=1){
    g.fillStyle(color, alpha);
    g.fillPoints(pts.map(p => new Phaser.Geom.Point(p.x, p.y)), true);
  }
  edgeOn(g, pts, color=SKIN.outline, w=2){
    g.lineStyle(w, color, 1);
    g.strokePoints(pts.map(p => new Phaser.Geom.Point(p.x, p.y)), true);
  }

  lidNear(b){
    const hs = (this.tipDir || 1) >= 0 ? 1 : -1;
    const A = this.lidAng * hs, c = Math.cos(A), s = Math.sin(A);
    const yh = -b.hy * hs, zh = b.z0;
    const dy = -yh, dz = (b.z1 - b.z0)/2;
    return this.depth(0, yh + dy*c - dz*s, zh + dy*s + dz*c) > this.depth(0, 0, 34);
  }

  /* ---------- composite + card renderers ---------- */
  drawRobotComposite(t, o){
    this.setPose({ K:o.K, dy:o.dy });
    const tipped = !!o.tipped;
    this.tipT = tipped ? 1 : 0;
    this.roll = tipped ? Math.PI*0.5 : 0;
    this.lidAng = tipped ? 2.35 : 0;
    const bobZ = tipped ? 0 : Math.sin(t*0.0022)*1.4;
    if(!tipped) this.wheelPhase = t*0.0008;

    /* shadow */
    const sr = this.roll; this.roll = 0;
    const sh = [];
    for(let i=0;i<14;i++){
      const a=(i/14)*Math.PI*2;
      sh.push(this.P(Math.cos(a)*34, -this.tipT*26 + Math.sin(a)*(30 + this.tipT*26), 0.5));
    }
    this.quadOn(this.g, sh, SKIN.shadow, 0.16);
    this.roll = sr;

    if(tipped){
      this.drawBurrito(-70, 34); this.drawCup(-104, 26, true);
      this.drawFry(-52, 44, 0.6); this.drawFry(-86, 48, 2.1); this.drawFry(-40, 26, 1.4);
    }

    const wheels = [];
    for(const side of [-1, 1]){
      for(const wx of WHEEL.xs){
        const c = {x:wx, y:side*WHEEL.side, z:WHEEL.z};
        wheels.push({ c, side, near: this.depth(c.x, c.y, c.z) > this.depth(c.x, -c.y, c.z) });
      }
    }
    for(const w of wheels) if(!w.near) this.drawWheel(w.c, w.side);
    const lidBox = {...LID, z0:LID.z0+bobZ, z1:LID.z1+bobZ};
    const lidIsNear = this.lidNear(lidBox);
    if(!lidIsNear) this.drawLid(lidBox);
    this.drawBox({hx:24, hy:17, z0:6, z1:BODY.z0+1}, 0x3f434c, 0x3a3d45, 0x2e3138, false);
    this.drawBox({...BODY, z0:BODY.z0+bobZ, z1:BODY.z1+bobZ}, SKIN.bodyTop, SKIN.bodyRight, SKIN.bodyLeft);
    this.drawBox({hx:BODY.hx+0.6, hy:BODY.hy+0.6, z0:STRIPE.z0+bobZ, z1:STRIPE.z1+bobZ},
                 null, SKIN.stripe, SKIN.stripeDk, false, true);
    if(this.lidAng > 0.12){
      const ring = (hx, hy) => [
        this.P(hx,-hy,LID.z0+0.5), this.P(hx,hy,LID.z0+0.5),
        this.P(-hx,hy,LID.z0+0.5), this.P(-hx,-hy,LID.z0+0.5)];
      const wn = this.R(0,0,1);
      if(wn.x + wn.y + wn.z > 0){
        this.quadOn(this.g, ring(LID.hx-2, LID.hy-2), SKIN.cavityWall);
        this.quadOn(this.g, ring(LID.hx-6, LID.hy-6), SKIN.cavityFloor);
      }
    }
    if(lidIsNear) this.drawLid(lidBox);

    const fn = this.R(1, 0, 0);
    if(fn.x + fn.y + fn.z > 0.3){
      const F = (yy, zz) => this.P(BODY.hx + 0.8, yy, zz + bobZ);
      this.quadOn(this.g, [F(-13,40), F(13,40), F(13,50), F(-13,50)], SKIN.visor);
      this.edgeOn(this.g, [F(-13,40), F(13,40), F(13,50), F(-13,50)], SKIN.outline, 1.5);
      if(tipped){
        this.g.lineStyle(2.5, SKIN.eyeAlert, 1);
        for(const ey of [-7, 7]){
          const c = F(ey, 45);
          this.g.lineBetween(c.x-4, c.y-4, c.x+4, c.y+4);
          this.g.lineBetween(c.x-4, c.y+4, c.x+4, c.y-4);
        }
      } else {
        const open = (Math.floor(t/2600) % 2 === 0 && t % 2600 < 140) ? 0.15 : 1;
        for(const ey of [-7, 7]){
          const c = F(ey, 45);
          this.g.fillStyle(SKIN.eye, 1);
          this.g.fillEllipse(c.x, c.y, 7, 7*open);
        }
      }
      this.quadOn(this.g, [F(-16,18), F(16,18), F(16,22), F(-16,22)], 0xfff3b0);
    }
    for(const w of wheels) if(w.near) this.drawWheel(w.c, w.side);
    this.flagLean = tipped ? 0 : Math.sin(t*0.002)*0.15;
    this.drawFlag(bobZ);
    this.tipT = 0; this.roll = 0; this.lidAng = 0;
  }

  drawFaceCard(t){
    const g = this.g, cx = this.cardCX, cy = this.cardCY;
    /* white panel */
    g.fillStyle(SKIN.bodyRight, 1); g.fillRoundedRect(cx-120, cy-46, 240, 74, 8);
    g.lineStyle(2, 0xc9ccd2, 1);   g.strokeRoundedRect(cx-120, cy-46, 240, 74, 8);
    const states = [
      { x:cx-72, mode:"normal" }, { x:cx, mode:"alert" }, { x:cx+72, mode:"dead" }
    ];
    for(const s of states){
      g.fillStyle(SKIN.visor, 1); g.fillRect(s.x-26, cy-30, 52, 22);
      if(s.mode === "dead"){
        g.lineStyle(2.5, SKIN.eyeAlert, 1);
        for(const ex of [-11, 11]){
          g.lineBetween(s.x+ex-4, cy-23, s.x+ex+4, cy-15);
          g.lineBetween(s.x+ex-4, cy-15, s.x+ex+4, cy-23);
        }
      } else {
        const open = s.mode === "normal" && (t % 3000 < 140) ? 0.15 : 1;
        g.fillStyle(s.mode === "alert" ? SKIN.eyeAlert : SKIN.eye, 1);
        g.fillEllipse(s.x-11, cy-19, 12, 12*open);
        g.fillEllipse(s.x+11, cy-19, 12, 12*open);
      }
      g.fillStyle(0xfff3b0, 1); g.fillRect(s.x-28, cy+8, 56, 8);
    }
  }

  drawBurrito(dx, dy){
    const g = this.g, K = 1.6;
    const p = { x:this.cardCX+dx, y:this.cardCY+dy };
    g.fillStyle(SKIN.shadow, 0.15); g.fillEllipse(p.x, p.y+8, 9*K*1.6, 4*K*1.6);
    g.fillStyle(0xe8b04b, 1); g.fillEllipse(p.x, p.y, 16*K*0.8*1.6, 9*K*0.8*1.6);
    g.lineStyle(2, 0xb5813a, 1); g.strokeEllipse(p.x, p.y, 16*K*0.8*1.6, 9*K*0.8*1.6);
    g.fillStyle(0x7fae4e, 1); g.fillEllipse(p.x + 5*K*1.3, p.y, 4*K*1.3, 5*K*1.3);
  }
  drawCup(dx, dy, puddle){
    const g = this.g, K = 1.6;
    const p = { x:this.cardCX+dx, y:this.cardCY+dy };
    if(puddle){ g.fillStyle(0x8b5a3c, 1); g.fillEllipse(p.x + 12*K, p.y + 8, 14*K*1.2, 5*K*1.2); }
    g.fillStyle(SKIN.shadow, 0.15); g.fillEllipse(p.x, p.y+10, 8*K*1.4, 3.5*K*1.4);
    g.fillStyle(0xf4f5f7, 1); g.fillRect(p.x - 4*K*1.1, p.y - 6*K*1.1, 8*K*1.1, 11*K*1.1);
    g.lineStyle(2, 0xc9ccd2, 1); g.strokeRect(p.x - 4*K*1.1, p.y - 6*K*1.1, 8*K*1.1, 11*K*1.1);
  }
  drawFry(dx, dy, ang){
    const g = this.g, K = 1.6;
    g.fillStyle(0xf2c94c, 1);
    g.save(); g.translateCanvas(this.cardCX+dx, this.cardCY+dy); g.rotateCanvas(ang);
    g.fillRect(-7*K*0.7, -2.2*K*0.35, 14*K*0.7, 2.2*K*0.7);
    g.restore();
  }

  drawTileCard(road){
    this.setPose({ K:1.15, dy:0 });
    const g = this.g, d = this.d;
    for(let tx=-1; tx<=0; tx++){
      for(let ty=-1; ty<=0; ty++){
        const cxm = tx*TILE*2 + TILE, cym = ty*TILE*2 + TILE;
        const pts = [
          this.W(cxm+TILE, cym-TILE, 0), this.W(cxm+TILE, cym+TILE, 0),
          this.W(cxm-TILE, cym+TILE, 0), this.W(cxm-TILE, cym-TILE, 0)];
        this.quadOn(g, pts, road ? d.road : (((tx+ty)%2===0) ? d.pave : d.paveB));
        if(!road) this.edgeOn(g, pts, d.paveEdge, 1.5);
      }
    }
    if(road){
      this.quadOn(g, [
        this.W(-14, -4, 0.4), this.W(14, -4, 0.4),
        this.W(14, 4, 0.4), this.W(-14, 4, 0.4)], d.roadLine);
    }
  }

  drawPaletteRows(){
    const g = this.g, names = Object.keys(PALETTES);
    const cx = this.cardCX, cy0 = this.cardCY - 42;
    names.forEach((n, i) => {
      const pal = PALETTES[n], y = cy0 + i*30;
      const keys = ["sky","pave","paveB","paveEdge","road","roadLine"];
      keys.forEach((k, j) => {
        g.fillStyle(pal[k], 1);
        g.fillRect(cx - 130 + j*36, y, 30, 20);
      });
    });
  }

  drawProgressCard(t){
    const g = this.g, cx = this.cardCX, cy = this.cardCY - 6;
    const bw = 220, bx = cx - bw/2;
    const pct = (Math.sin(t*0.0011) + 1)/2;
    g.fillStyle(0xffffff, 0.5); g.fillRoundedRect(bx, cy, bw, 7, 3);
    g.fillStyle(0xff7a1a, 1);   g.fillRoundedRect(bx, cy, Math.max(bw*pct, 7), 7, 3);
    g.fillStyle(0xc2452e, 1);   g.fillRect(bx+bw-2, cy-5, 4, 17);
    g.fillStyle(0x2e3138, 1);   g.fillCircle(bx+bw*pct, cy+3.5, 5);
  }

  drawTiltCard(t){
    const g = this.g, cx = this.cardCX, cy = this.cardCY + 14, r = 30;
    const tilt = Math.sin(t*0.0016)*0.95;
    const danger = Math.min(Math.abs(tilt), 1);
    g.lineStyle(6, 0xffffff, 0.55);
    g.beginPath(); g.arc(cx, cy, r, Math.PI, 0); g.strokePath();
    g.lineStyle(6, danger > 0.75 ? 0xc2452e : danger > 0.45 ? 0xff7a1a : 0x3f7d43, 1);
    g.beginPath();
    g.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + Phaser.Math.Clamp(tilt, -1, 1)*1.35, tilt < 0);
    g.strokePath();
    g.lineStyle(3, 0xe8eaef, 1);
    g.lineBetween(cx, cy, cx + Math.sin(tilt*1.2)*r, cy - Math.cos(tilt*1.2)*r);
  }

  drawSwatches(){
    const g = this.g;
    const keys = Object.keys(SKIN);
    const x0 = this.cardX + 14, y0 = this.cardY + 12, cw = 66, ch = 44;
    keys.forEach((k, i) => {
      const x = x0 + (i % 4)*cw, y = y0 + Math.floor(i/4)*ch;
      g.fillStyle(SKIN[k], 1);
      g.fillRoundedRect(x, y, cw-10, 22, 4);
      g.lineStyle(1, 0x363b46, 1);
      g.strokeRoundedRect(x, y, cw-10, 22, 4);
    });
    if(!this.swatchLabels){
      this.swatchLabels = true;
      keys.forEach((k, i) => {
        const x = x0 + (i % 4)*cw, y = y0 + Math.floor(i/4)*ch;
        this.add.text(x, y + 24, k, { fontSize:"9px", color:"#8f95a1" });
      });
    }
  }

  /* ========== INJECTED FROM game/index.html — keep in sync ========== */
  drawProp(g, kind, x, y, t, fdir = 0, z = 0){
    const dv = DIRV[fdir], rv = DIRV[(fdir+1)%4];
    const W = (dx, dy, dz) => this.W(x + dv.x*dx + rv.x*dy, y + dv.y*dx + rv.y*dy, z + dz);
    if(kind === "palm" || kind === "palmDwarf"){
      /* approved in palm lab — tall (165/8/1.0) and dwarf (55/8/0.3) presets */
      const P = kind === "palmDwarf" ? PALM_DWARF : PALM, K = this.K;
      const o = W(0, 0, 0);
      const seed = ((Math.round(x)*7919) ^ (Math.round(y)*104729)) >>> 0;
      const rng = mulberry32(seed);
      const lean = P.trunkLean * (rng()*2 - 1) * 2;
      const H = P.height * (0.85 + rng()*0.3);
      const phase = rng()*Math.PI*2;
      const sway = Math.sin(t*0.0011 + phase) * 3.2 * P.wind;

      g.fillStyle(P.shadow, 0.13);
      g.fillEllipse(o.x + lean*22*K, o.y + 3, (36 + H*0.14)*K, 12*K);

      const SEG = 8, spine = [];
      for(let i=0; i<=SEG; i++){
        const u = i/SEG;
        spine.push({ x: o.x + (lean*H*u*u + sway*u*u)*K, y: o.y - H*u*K, w: (7.5 - 4.5*u)*K });
      }
      for(let i=0; i<SEG; i++){
        const a2 = spine[i], b2 = spine[i+1];
        this.quadOn(g, [
          {x:a2.x-a2.w/2, y:a2.y}, {x:a2.x+a2.w/2, y:a2.y},
          {x:b2.x+b2.w/2, y:b2.y}, {x:b2.x-b2.w/2, y:b2.y}
        ], i % 2 === 0 ? P.trunk : P.trunkDk);
        if(i % 2 === 1){
          g.lineStyle(1.5, P.ring, 1);
          g.lineBetween(a2.x-a2.w/2, a2.y, a2.x+a2.w/2, a2.y);
        }
      }
      const crown = spine[SEG];
      const fronds = [];
      for(let i=0; i<P.fronds; i++){
        const baseA = (i/P.fronds)*Math.PI*2 + rng()*0.25;
        const dirY = Math.sin(baseA)*0.45 - 0.12;
        fronds.push({
          dirX: Math.cos(baseA), dirY,
          flut: Math.sin(t*0.0021 + phase + i*1.7) * 0.06 * P.wind,
          len: (44 + rng()*14)*(P.spread || 1)*K,
          back: dirY < -0.18
        });
      }
      const drawFrond = (f2, color) => {
        const steps = 7;
        let px = crown.x, py = crown.y;
        for(let sI=1; sI<=steps; sI++){
          const u = sI/steps;
          const nx = crown.x + f2.dirX*f2.len*u;
          const ny = crown.y + f2.dirY*f2.len*u + (P.droop*30*u*u + f2.flut*26*u)*K;
          const lw = (9 - 7*u)*K;
          const tx2 = nx - px, ty2 = ny - py;
          const tl = Math.hypot(tx2, ty2) || 1;
          const pxn = -ty2/tl, pyn = tx2/tl;
          g.fillStyle(color, 1);
          g.fillTriangle(px, py, nx, ny, px + pxn*lw + tx2*0.3, py + pyn*lw + ty2*0.3);
          g.fillTriangle(px, py, nx, ny, px - pxn*lw + tx2*0.3, py - pyn*lw + ty2*0.3);
          px = nx; py = ny;
        }
      };
      for(const f2 of fronds) if(f2.back) drawFrond(f2, P.frondB);
      for(let i=0; i<3; i++){
        const a3 = phase + i*2.1;
        g.fillStyle(i === 1 ? P.cocoHi : P.coco, 1);
        g.fillCircle(crown.x + Math.cos(a3)*6*K, crown.y + 4*K + Math.sin(a3)*3*K, 4.2*K);
      }
      for(const f2 of fronds) if(!f2.back) drawFrond(f2, P.frondA);
    } else if(kind === "scooter" || kind === "scooterStanding"){
      /* approved in scooter lab: stem 42 · bar 13 · wheel 5, brand-liveried.
         ONE rigid standing build; dumped = laid on its side. Seeded pose
         (~80% dumped), scatter rotation, rental brand. */
      const S = SCOOT;
      const seed = ((Math.round(x)*7919) ^ (Math.round(y)*104729)) >>> 0;
      const rng = mulberry32(seed);
      const sth = (rng()*2 - 1) * Math.PI * 0.9;
      const scs = Math.cos(sth), ssn = Math.sin(sth);
      const brand = BRANDS[Math.floor(rng()*BRANDS.length)];
      const lay = kind === "scooterStanding" ? false : rng() < 0.8;
      const L = 1;

      const M = (a, b, h) => lay ? { a, b: -h - 2, h: (b + 7) * 0.55 } : { a, b, h };
      const GG = (a, b, h) => {
        const m = M(a, b, h);
        return W(m.a*scs - m.b*ssn, m.a*ssn + m.b*scs, m.h);
      };
      const dAt = (a, b, h) => {
        const m = M(a, b, h);
        return m.a*(scs+ssn) + m.b*(scs-ssn) + m.h*0.4;
      };

      const wheelR = S.wheelR*L;
      const stemBaseA = 11*L, stemBaseH = 5.2;
      const stemTipA = 13*L, stemTipH = 4 + S.stemH*L;
      const fwA = 16*L + wheelR*0.95;
      const rwA = -20*L - wheelR*0.9;
      const wheelH = wheelR*0.72;

      const ringAt = (a0, b0, h0, r, d1, d2, n=12) => {
        const pts = [];
        for(let i=0; i<n; i++){
          const phi = (i/n)*Math.PI*2, c3 = Math.cos(phi)*r, s3 = Math.sin(phi)*r;
          pts.push(GG(a0 + c3*d1.a + s3*d2.a, b0 + c3*d1.b + s3*d2.b, h0 + c3*d1.h + s3*d2.h));
        }
        return pts;
      };
      const U = {a:1,b:0,h:0}, VV = {a:0,b:1,h:0}, HHH = {a:0,b:0,h:1};

      const shp = lay ? W(-26*ssn, 26*scs, 0) : W(2*scs, 2*ssn, 0);
      g.fillStyle(S.shadow, 0.13);
      g.fillEllipse(shp.x, shp.y, ((lay ? 84 : 50)*L)*this.K*0.45, (lay ? 30 : 18)*this.K*0.4);

      const WW = 4.6;
      const swheel = (a, r) => {
        if(!lay){
          const csh = GG(a, 0, 0);
          g.fillStyle(S.shadow, 0.12);
          g.fillEllipse(csh.x, csh.y + 2, r*2.4, r*0.9);
        }
        const end = k => ringAt(a, k, wheelH, r, U, HHH, 14);
        this.quadOn(g, convexHull(end(-WW/2).concat(end(WW/2))), S.wheelDk);
        const kF = dAt(a, WW/2, wheelH) > dAt(a, -WW/2, wheelH) ? WW/2 : -WW/2;
        const face = rr => ringAt(a, kF, wheelH, rr, U, HHH, 14);
        this.quadOn(g, face(r), S.wheel);
        this.quadOn(g, face(r*0.42), S.hubFace);
        this.quadOn(g, face(r*0.2), S.hub);
      };
      const sdeck = () => {
        const top = [], bot = [];
        for(const bc of [[-20*L,-7],[16*L,-7],[16*L,7],[-20*L,7]]){
          top.push(GG(bc[0], bc[1], 5.2)); bot.push(GG(bc[0], bc[1], 0.8));
        }
        this.quadOn(g, convexHull(top.concat(bot)), brand.cDk);
        const topVisible = lay ? (ssn - scs) > 0 : true;
        if(topVisible){
          this.quadOn(g, top, brand.c);
          this.quadOn(g, [GG(-16*L,-4,5.6), GG(8*L,-4,5.6), GG(8*L,4,5.6), GG(-16*L,4,5.6)], S.grip);
        }
      };
      const sstem = () => {
        const da = stemTipA - stemBaseA, dh = stemTipH - stemBaseH;
        const slen = Math.hypot(da, dh) || 1;
        const perp = {a:-dh/slen, b:0, h:da/slen};
        const base = ringAt(stemBaseA, 0, stemBaseH, 3.1, VV, perp, 10);
        const tip  = ringAt(stemTipA, 0, stemTipH, 2.0, VV, perp, 10);
        this.quadOn(g, convexHull(base.concat(tip)), brand.c);
      };
      const sbar = () => {
        const capsule = (b0, b1, r, col) => {
          const e0 = ringAt(stemTipA, b0, stemTipH, r, U, HHH, 8);
          const e1 = ringAt(stemTipA, b1, stemTipH, r, U, HHH, 8);
          this.quadOn(g, convexHull(e0.concat(e1)), col);
        };
        capsule(-S.barW, S.barW, 1.6, S.metal);
        capsule(-S.barW, -S.barW + 6, 2.5, S.deck);
        capsule(S.barW - 6, S.barW, 2.5, S.deck);
      };
      const skick = () => {
        const ks0 = GG(-4*L, -7, 4), ks1 = GG(-6*L, -12, 0);
        g.lineStyle(2.5, S.metalDk, 1);
        g.lineBetween(ks0.x, ks0.y, ks1.x, ks1.y);
      };

      const sparts = [
        { d: dAt(rwA, 0, wheelH),  fn: () => swheel(rwA, wheelR) },
        { d: dAt(-2*L, 0, 3),      fn: sdeck },
        { d: dAt((stemBaseA + stemTipA)/2, 0, (stemBaseH + stemTipH)/2), fn: sstem },
        { d: dAt(fwA, 0, wheelH),  fn: () => swheel(fwA, wheelR*0.92) },
        { d: dAt(stemTipA, 0, stemTipH), fn: sbar },
        { d: dAt(-5*L, -9, 3),     fn: skick }
      ];
      sparts.sort((p1, p2) => p1.d - p2.d);
      for(const pt of sparts) pt.fn();
    } else if(kind === "trash"){
      g.fillStyle(0x3b3f47, 1);
      g.fillEllipse(W(0,0,6).x, W(0,0,6).y, 26, 18);
      g.fillEllipse(W(6,3,10).x, W(6,3,10).y, 18, 13);
      g.lineStyle(2, 0x2b2e34, 1);
      g.strokeEllipse(W(0,0,6).x, W(0,0,6).y, 26, 18);
    } else if(kind === "cone" || kind === "coneTipped"){
      /* approved in cone lab: height 38 · base 18 · no band. coneTipped is
         the same rigid cone resting on its slant side. */
      const C = CONE, K = this.K;
      const seed = ((Math.round(x)*7919) ^ (Math.round(y)*104729)) >>> 0;
      const rng = mulberry32(seed);
      const cth = rng()*Math.PI*2;
      const cc = Math.cos(cth), sc = Math.sin(cth);
      const H = C.height * (0.9 + rng()*0.2);
      const knocked = kind === "coneTipped";
      const GG = (a, b, h) => W(a*cc - b*sc, a*sc + b*cc, h);
      const dAt = (a, b, h) => a*(cc+sc) + b*(cc-sc) + h*0.4;
      const rOf = hh => 8.5 - (8.5 - 1.8) * (hh / H);
      const place = (hh, r, n=12) => {
        const pts = [];
        for(let i=0; i<n; i++){
          const phi = (i/n)*Math.PI*2, c3 = Math.cos(phi)*r, s3 = Math.sin(phi)*r;
          if(knocked) pts.push(GG(1 + hh, c3, rOf(hh) + s3));
          else        pts.push(GG(c3, s3, hh));
        }
        return pts;
      };
      const sh = knocked ? GG(1 + H/2, 0, 0) : GG(0, 0, 0);
      g.fillStyle(C.shadow, 0.13);
      g.fillEllipse(sh.x, sh.y + 2, (knocked ? H + 16 : C.base*1.6)*K*0.55,
                    (knocked ? 14 : C.base*0.7)*K*0.55);
      const baseSlab = () => {
        const hb = C.base/2, pts = [];
        for(const bc of [[-hb,-hb],[hb,-hb],[hb,hb],[-hb,hb]]){
          if(knocked){ pts.push(GG(0, bc[0], hb + bc[1])); pts.push(GG(3, bc[0], hb + bc[1])); }
          else       { pts.push(GG(bc[0], bc[1], 0));      pts.push(GG(bc[0], bc[1], 3)); }
        }
        this.quadOn(g, convexHull(pts), C.bodyDk);
        if(!knocked){
          const top = [GG(-hb,-hb,3), GG(hb,-hb,3), GG(hb,hb,3), GG(-hb,hb,3)];
          this.quadOn(g, top, C.body);
          this.edgeOn(g, top, C.bodyDk, 1.5);
        }
      };
      const body = () => {
        this.quadOn(g, convexHull(place(2, rOf(2)).concat(place(H, 1.8))), C.body);
        if(C.band > 0){
          const b0 = H*0.52, b1 = Math.min(H*0.52 + C.band, H*0.9);
          this.quadOn(g, convexHull(place(b0, rOf(b0)+0.5).concat(place(b1, rOf(b1)+0.5))), C.band_c);
        }
        this.quadOn(g, place(H, 1.8, 8), C.bodyDk);
      };
      const cparts = [
        { d: knocked ? dAt(1.5, 0, C.base/2) : dAt(0, 0, 1.5), fn: baseSlab },
        { d: knocked ? dAt(1 + H*0.45, 0, rOf(H*0.45)) : dAt(0, 0, H*0.45), fn: body }
      ];
      cparts.sort((p1, p2) => p1.d - p2.d);
      for(const pt of cparts) pt.fn();
    } else if(kind === "hydrant" || kind === "hydrantBurst"){
      /* approved in hydrant lab: height 20 · base 8 · dome 6.5 · nozzle 2.6.
         hydrantBurst shears the front nozzle open with an animated water
         arc and a puddle that paints early (ground layer, like the
         shadow) so the hydrant's own body always draws over it. */
      const HH = HYD, bursting = kind === "hydrantBurst";
      const seed = ((Math.round(x)*7919) ^ (Math.round(y)*104729) ^ 0x4a7d) >>> 0;
      const rng = mulberry32(seed);
      const hth = rng()*Math.PI*2;
      const hcs = Math.cos(hth), hsn = Math.sin(hth);
      const height = HH.height;
      const GG = (a, b, h) => W(a*hcs - b*hsn, a*hsn + b*hcs, h);
      const dAt = (a, b, h) => a*(hcs+hsn) + b*(hcs-hsn) + h*0.4;

      const rOf = h => {
        const u = h / height;
        if(u < 0.08) return HH.baseR;
        if(u < 0.75) return HH.baseR*0.62 - (HH.baseR*0.62 - HH.baseR*0.5)*((u-0.08)/0.67);
        return HH.baseR*0.5 + (HH.baseR*0.78 - HH.baseR*0.5) * ((u-0.75)/0.25);
      };
      const place = (h, r, n=14) => {
        const pts = [];
        for(let i=0; i<n; i++){
          const phi = (i/n)*Math.PI*2, c3 = Math.cos(phi)*r, s3 = Math.sin(phi)*r;
          pts.push(GG(c3, s3, h));
        }
        return pts;
      };

      const hsh = GG(0, 0, 0);
      g.fillStyle(HH.shadow, 0.14);
      g.fillEllipse(hsh.x, hsh.y + 2, HH.baseR*2.1*this.K*0.42, HH.baseR*0.95*this.K*0.42);

      /* puddle: ground decal, paints BEFORE the hydrant's own body
         parts so the barrel/dome/nozzles naturally draw over it. */
      if(bursting){
        const nc0 = 1, ns0 = 0;
        const facing0 = nc0*(hcs+hsn) + ns0*(hcs-hsn) > 0;
        if(facing0){
          const tipA0 = HH.baseR*0.55 + HH.nozR*2.2;
          const landA = tipA0 + nc0*26, landB = ns0*26;
          const puddleRing = (rad, nn=16) => {
            const pts = [];
            for(let i=0; i<nn; i++){
              const phi = (i/nn)*Math.PI*2;
              pts.push(GG(landA + Math.cos(phi)*rad, landB + Math.sin(phi)*rad, 0.3));
            }
            return pts;
          };
          this.quadOn(g, puddleRing(TILE*0.85), HH.water, 0.28);
          this.quadOn(g, puddleRing(TILE*0.55), HH.water, 0.22);
        }
      }

      const hbarrel = () => {
        const n = 6, all = [];
        for(let i=0; i<=n; i++) all.push(...place(i/n*height*0.9, rOf(i/n*height*0.9)));
        this.quadOn(g, convexHull(all), HH.cap);
      };
      const hshoulder = () => {
        const h0 = height*0.75, h1 = height*0.9;
        this.quadOn(g, convexHull(place(h0, rOf(h0)).concat(place(h1, rOf(h1)))), HH.cap);
      };
      const hdome = () => {
        const domeBase = height*0.9, domeR = HH.domeR;
        const n = 8, rings = [];
        for(let i=0; i<=n; i++){
          const u = i/n, r2 = domeR * Math.cos(u*Math.PI*0.5);
          rings.push(place(domeBase + u*domeR*0.9, r2));
        }
        const all = []; for(const r2 of rings) all.push(...r2);
        this.quadOn(g, convexHull(all), HH.cap);
        const capTop = GG(0, 0, domeBase + domeR*0.9 + 1);
        g.fillStyle(HH.capDk, 1);
        g.fillCircle(capTop.x, capTop.y, 1.8*this.K*0.45);
      };
      const hnozzleSpray = (ang, r) => () => {
        if(!bursting) return;
        const nc = Math.cos(ang), ns = Math.sin(ang);
        const facing = nc*(hcs+hsn) + ns*(hcs-hsn) > 0;
        if(!facing) return;
        const tipA = nc*(HH.baseR*0.55 + r*2.2), tipB = ns*(HH.baseR*0.55 + r*2.2);
        const hgt = height*0.42;
        const n = 9;
        for(let i=0; i<n; i++){
          const u = ((t*0.0026 + i/n) % 1);
          const dist = u * 26;
          const arcH = hgt + 14*u - 26*u*u;
          const pt = GG(tipA + nc*dist, tipB + ns*dist, Math.max(arcH, 0.5));
          const alpha = 0.9 * (1 - u*0.55);
          const r2 = Math.max(0.6, 1.6 - u*1.0);
          g.fillStyle(u > 0.82 ? HH.waterDk : HH.water, alpha);
          g.fillCircle(pt.x, pt.y, r2*this.K*0.4);
        }
      };
      const hnozzle = (ang, r, breakable) => () => {
        const nc = Math.cos(ang), ns = Math.sin(ang);
        const baseA = nc*(HH.baseR*0.55), baseB = ns*(HH.baseR*0.55);
        const tipA = nc*(HH.baseR*0.55 + r*2.2), tipB = ns*(HH.baseR*0.55 + r*2.2);
        const hgt = height*0.42;
        const ring = (a0,b0,rad) => {
          const pts = [];
          for(let i=0;i<10;i++){
            const phi=(i/10)*Math.PI*2;
            const perpA = -ns, perpB = nc;
            pts.push(GG(a0 + Math.cos(phi)*rad*perpA, b0 + Math.cos(phi)*rad*perpB, hgt + Math.sin(phi)*rad));
          }
          return pts;
        };
        this.quadOn(g, convexHull(ring(baseA,baseB,r).concat(ring(tipA,tipB,r))), HH.cap);
        const facing = nc*(hcs+hsn) + ns*(hcs-hsn) > 0;
        if(!facing) return;
        if(bursting && breakable){
          this.quadOn(g, ring(tipA,tipB,r*0.9), HH.nut);
          this.quadOn(g, ring(tipA,tipB,r*0.5), HH.capDk);
        } else {
          this.quadOn(g, ring(tipA,tipB,r*0.8), HH.capDk);
        }
      };

      const domeBase = height*0.9, domeR = HH.domeR;
      const hparts = [
        { d: dAt(0,0,height*0.3), fn: hbarrel },
        { d: dAt(0,0,height*0.82), fn: hshoulder },
        { d: dAt(HH.baseR*0.55*Math.cos(0), HH.baseR*0.55*Math.sin(0), height*0.42), fn: hnozzle(0, HH.nozR, true) },
        { d: dAt(HH.baseR*0.55*Math.cos(Math.PI), HH.baseR*0.55*Math.sin(Math.PI), height*0.42), fn: hnozzle(Math.PI, HH.nozR, false) },
        { d: dAt(0,0, domeBase+domeR*0.9), fn: hdome },
        { d: dAt(HH.baseR*0.55 + HH.nozR*2.2 + 20, 0, height*0.42 + 8), fn: hnozzleSpray(0, HH.nozR) }
      ];
      hparts.sort((p1, p2) => p1.d - p2.d);
      for(const pt of hparts) pt.fn();
    } else if(kind === "planter"){
      const b0=W(-16,-10,0), b1=W(16,-10,0), b2=W(16,10,0), b3=W(-16,10,0);
      this.quadOn(g, [W(-16,-10,10), W(16,-10,10), W(16,10,10), W(-16,10,10)], 0x8f8577);
      this.quadOn(g, [b1, b2, W(16,10,10), W(16,-10,10)], 0x7a7164);
      this.quadOn(g, [b2, b3, W(-16,10,10), W(16,10,10)], 0x6b6357);
      g.fillStyle(0x4e8f4a, 1);
      g.fillEllipse(W(0,0,16).x, W(0,0,16).y, 30, 14);
    } else if(kind === "dog"){
      /* approved in dog lab: chihuahua — apple-dome head, bat ears,
         bug eyes, pin legs, sickle tail. Small seeded facing variance
         so dogs on the route don't all stare the same way. */
      const D = DOG, L = D.len;
      const seed = ((Math.round(x)*7919) ^ (Math.round(y)*104729) ^ 0x5a5a) >>> 0;
      const rng = mulberry32(seed);
      const dth = (rng()*2 - 1) * 0.6;
      const dcs = Math.cos(dth), dsn = Math.sin(dth);
      const GG = (a, b, h) => W(a*dcs - b*dsn, a*dsn + b*dcs, h);
      const dAt = (a, b, h) => a*(dcs+dsn) + b*(dcs-dsn) + h*0.4;

      const ringAt = (a0, b0, h0, r, d1, d2, n=12) => {
        const pts = [];
        for(let i=0; i<n; i++){
          const phi = (i/n)*Math.PI*2, c3 = Math.cos(phi)*r, s3 = Math.sin(phi)*r;
          pts.push(GG(a0 + c3*d1.a + s3*d2.a, b0 + c3*d1.b + s3*d2.b, h0 + c3*d1.h + s3*d2.h));
        }
        return pts;
      };
      const VV = {a:0,b:1,h:0}, HHH = {a:0,b:0,h:1};
      const px = r => r * this.K * 1.12;

      const legH = D.legH*L, bodyR = 5.0*L, chestR = 5.6*L, headR = D.headR*L, earH = D.earH*L;
      const rearA = -9*L, rearH = legH + bodyR*0.72;
      const chestA = 6*L, chestH = legH + bodyR*0.72;
      const headA = 9.5*L, headH = chestH + 6.2*L + headR*0.35;

      const dsh = GG((rearA+chestA)/2, 0, 0);
      g.fillStyle(D.shadow, 0.13);
      g.fillEllipse(dsh.x, dsh.y + 1, (40*L)*this.K*0.45, (14*L)*this.K*0.4);

      const dbody = () => {
        const rear = ringAt(rearA, 0, rearH, bodyR, VV, HHH, 12);
        const chest = ringAt(chestA, 0, chestH, chestR, VV, HHH, 12);
        this.quadOn(g, convexHull(rear.concat(chest)), D.body);
        this.quadOn(g, ringAt(rearA - bodyR*0.25, 0, rearH, bodyR*0.9, VV, HHH, 12), D.bodyDk);
      };
      const dleg = (a0, s, foot) => () => {
        const top = GG(a0, s*2.9*L, chestH - 1*L);
        const bot = GG(a0 + foot, s*2.9*L, 0.8);
        g.lineStyle(Math.max(2, 0.9*L*this.K*0.42), D.body, 1);
        g.lineBetween(top.x, top.y, bot.x, bot.y);
        g.fillStyle(D.bodyDk, 1);
        g.fillEllipse(bot.x, bot.y + 1, px(1.4*L)*1.5, px(1.4*L)*0.7);
      };
      const dchest = () => {
        const c = GG(chestA + chestR*0.45, 0, chestH - chestR*0.3);
        g.fillStyle(D.chest, 1);
        g.fillCircle(c.x, c.y, px(chestR*0.52));
      };
      const dneck = () => {
        const n0 = ringAt(chestA + 1*L, 0, chestH + 2*L, 2.5*L, VV, HHH, 10);
        const n1 = ringAt(headA - 1*L, 0, headH - headR*0.55, 2.2*L, VV, HHH, 10);
        this.quadOn(g, convexHull(n0.concat(n1)), D.body);
      };
      const dcollar = () => {
        const cA = chestA + 1.6*L, cH = chestH + 2.8*L;
        const c0 = ringAt(cA, 0, cH, 2.7*L, VV, HHH, 10);
        const c1 = ringAt(cA + 0.7*L, 0, cH + 0.9*L, 2.6*L, VV, HHH, 10);
        this.quadOn(g, convexHull(c0.concat(c1)), D.collar);
        const tag = GG(cA + 2.4*L, 0, cH - 1.4*L);
        g.fillStyle(0xe8c34a, 1);
        g.fillCircle(tag.x, tag.y, px(0.7*L));
      };
      const dhead = () => {
        const c = GG(headA, 0, headH);
        g.fillStyle(D.body, 1);
        g.fillCircle(c.x, c.y, px(headR));
      };
      const dear = s => () => {
        const b1 = GG(headA - headR*0.15, s*headR*0.35, headH + headR*0.6);
        const b2 = GG(headA - headR*0.7,  s*headR*0.6,  headH + headR*0.28);
        const tp = GG(headA - headR*0.5,  s*(headR*0.85 + earH*0.32), headH + headR*0.45 + earH);
        g.fillStyle(D.body, 1);
        g.fillTriangle(b1.x, b1.y, b2.x, b2.y, tp.x, tp.y);
        g.lineStyle(1.5, D.bodyDk, 1);
        g.strokeTriangle(b1.x, b1.y, b2.x, b2.y, tp.x, tp.y);
        const cx2 = (b1.x+b2.x+tp.x)/3, cy2 = (b1.y+b2.y+tp.y)/3;
        const lerp = (pp, k) => ({ x: pp.x + (cx2-pp.x)*k, y: pp.y + (cy2-pp.y)*k });
        const i1 = lerp(b1,0.38), i2 = lerp(b2,0.38), i3 = lerp(tp,0.3);
        g.fillStyle(D.ear, 1);
        g.fillTriangle(i1.x, i1.y, i2.x, i2.y, i3.x, i3.y);
      };
      const deye = s => () => {
        const c = GG(headA + headR*0.42, s*headR*0.44, headH + headR*0.12);
        g.fillStyle(D.eye, 1);
        g.fillCircle(c.x, c.y, px(headR*0.21));
        g.fillStyle(D.glint, 1);
        g.fillCircle(c.x - px(headR*0.07), c.y - px(headR*0.08), px(headR*0.06));
      };
      const dmuzzle = () => {
        const m0 = ringAt(headA + headR*0.5,  0, headH - headR*0.28, headR*0.4,  VV, HHH, 10);
        const m1 = ringAt(headA + headR*0.95, 0, headH - headR*0.34, headR*0.22, VV, HHH, 10);
        this.quadOn(g, convexHull(m0.concat(m1)), D.chest);
        const n = GG(headA + headR*1.02, 0, headH - headR*0.3);
        g.fillStyle(D.nose, 1);
        g.fillCircle(n.x, n.y, px(headR*0.13));
      };
      const dtail = () => {
        const rr = 3.9*L, Ca = rearA - 0.8*L, Ch = rearH + bodyR*0.15 + rr;
        const thMax = Math.min((0.55 + 0.85*D.tailCurl) * Math.PI, 1.9*Math.PI);
        const n = 8;
        for(let i=0; i<=n; i++){
          const u = i/n, ang = u*thMax;
          const p2 = GG(Ca - rr*Math.sin(ang), 1.0*L + u*0.8*L, Ch - rr*Math.cos(ang));
          g.fillStyle(u > 0.75 ? D.chest : D.bodyDk, 1);
          g.fillCircle(p2.x, p2.y, px((1.25 - u*0.55)*L));
        }
      };

      const dparts = [
        { d: dAt(rearA - 2*L, 1*L, rearH + bodyR), fn: dtail },
        { d: dAt(rearA, 0, rearH), fn: dbody },
        { d: dAt(chestA + chestR*0.45, 0, chestH - chestR*0.3), fn: dchest },
        { d: dAt(chestA + 1.5*L, 0, chestH + 2*L), fn: dneck },
        { d: dAt(chestA + 2*L, 0, chestH + 3*L), fn: dcollar },
        { d: dAt(headA, 0, headH), fn: dhead },
        { d: dAt(headA - headR*0.5, headR*0.85 + earH*0.3, headH + earH*0.6), fn: dear(1) },
        { d: dAt(headA - headR*0.5, -(headR*0.85 + earH*0.3), headH + earH*0.6), fn: dear(-1) },
        { d: dAt(headA + headR*0.42, headR*0.44, headH), fn: deye(1) },
        { d: dAt(headA + headR*0.42, -headR*0.44, headH), fn: deye(-1) },
        { d: dAt(headA + headR*0.8, 0, headH - headR*0.3), fn: dmuzzle },
        { d: dAt(chestA + 0.5*L,  2.9*L, legH*0.4), fn: dleg(chestA + 0.5*L, 1, 0.4*L) },
        { d: dAt(chestA + 0.5*L, -2.9*L, legH*0.4), fn: dleg(chestA + 0.5*L, -1, 0.4*L) },
        { d: dAt(rearA + 1*L,  2.9*L, legH*0.4), fn: dleg(rearA + 1*L, 1, -0.4*L) },
        { d: dAt(rearA + 1*L, -2.9*L, legH*0.4), fn: dleg(rearA + 1*L, -1, -0.4*L) }
      ];
      dparts.sort((p1, p2) => p1.d - p2.d);
      for(const pt of dparts) pt.fn();
    } else if(kind === "car"){
      // parked car on the road
      const cz = 6;
      this.quadOn(g, [W(40,-16,cz), W(40,16,cz), W(40,16,cz+16), W(40,-16,cz+16)], 0x8695a5);
      this.quadOn(g, [W(-40,16,cz), W(40,16,cz), W(40,16,cz+16), W(-40,16,cz+16)], 0x76839a);
      this.quadOn(g, [W(-40,-16,cz+16), W(40,-16,cz+16), W(40,16,cz+16), W(-40,16,cz+16)], 0x9aa7b5);
      this.quadOn(g, [W(-24,-13,cz+16), W(20,-13,cz+16), W(14,13,cz+28), W(-18,13,cz+28)], 0x5b6a7a);
      g.fillStyle(0x24262c, 1);
      g.fillEllipse(W(-26,17,3).x, W(-26,17,3).y, 16, 10);
      g.fillEllipse(W(24,17,3).x, W(24,17,3).y, 16, 10);
    } else if(kind === "bin" || kind === "binKnocked"){
      /* approved in bin lab: height 40 · base 13 · lid 15 · band 3
         standing / 0 knocked. Knocked is the SAME barrel resting on
         its side (same trick as cone), lid sprung open, trash spilled. */
      const B = BIN;
      const seed = ((Math.round(x)*7919) ^ (Math.round(y)*104729) ^ 0x8177) >>> 0;
      const rng = mulberry32(seed);
      const bth = rng()*Math.PI*2;
      const bcs = Math.cos(bth), bsn = Math.sin(bth);
      const H = B.height;
      const knocked = kind === "binKnocked";
      const band = knocked ? 0 : B.band;
      const GG = (a, b, h) => W(a*bcs - b*bsn, a*bsn + b*bcs, h);
      const dAt = (a, b, h) => a*(bcs+bsn) + b*(bcs-bsn) + h*0.4;

      const rOf = h => { const u = h / H; return B.baseR * (0.88 + 0.12*Math.sin(u*Math.PI)); };
      const place = (h, r, n=14) => {
        const pts = [];
        for(let i=0; i<n; i++){
          const phi = (i/n)*Math.PI*2, c3 = Math.cos(phi)*r, s3 = Math.sin(phi)*r;
          if(knocked) pts.push(GG(1 + h, c3, r + s3));
          else        pts.push(GG(c3, s3, h));
        }
        return pts;
      };
      const ringDepth = h => knocked ? dAt(1 + h, 0, rOf(h)) : dAt(0, 0, h);

      const bsh = knocked ? GG(1 + H/2, 0, 0) : GG(0, 0, 0);
      g.fillStyle(B.shadow, 0.14);
      g.fillEllipse(bsh.x, bsh.y + 2, (knocked ? H + 20 : B.lidR*2.1)*this.K*0.42,
                    (knocked ? 22 : B.lidR*0.95)*this.K*0.42);

      const bbody = () => {
        /* safety-net base: one full hull, so even if a rib band's
           hull is imperfect at its edge, whatever shows through is
           still correct barrel color, never sky. */
        const n = 6, all = [];
        for(let i=0; i<=n; i++) all.push(...place(i/n*H, rOf(i/n*H)));
        this.quadOn(g, convexHull(all), B.body);
        /* corrugated ribbing: full-contrast alternating bands, same
           wide 6-segment spacing as the base hull (not the original
           10-thin-band version, whose narrow slivers near the tapered
           ends were the actual source of the stray-piece artifact). */
        const ribN = 6, ribs = [];
        for(let i=0; i<=ribN; i++) ribs.push(place(i/ribN*H, rOf(i/ribN*H)));
        for(let i=0; i<ribN; i++){
          this.quadOn(g, convexHull(ribs[i].concat(ribs[i+1])), i % 2 === 0 ? B.body : B.bodyDk);
        }
        /* shadow half: lower hull only, darkens the ground-facing side */
        const lowerN = 3, lower = [];
        for(let i=0; i<=lowerN; i++) lower.push(...place(i/lowerN*(H*0.5), rOf(i/lowerN*(H*0.5))));
        this.quadOn(g, convexHull(lower), B.bodyDk, 0.2);
        if(band > 0){
          const b0 = H*0.6, b1 = Math.min(b0 + band, H*0.92);
          this.quadOn(g, convexHull(place(b0, rOf(b0)+0.3).concat(place(b1, rOf(b1)+0.3))), B.band_c);
          /* back ellipse: dark far wall glimpsed over the top edge of
             the band — without this the band reads as a flat painted
             stripe; with it, it reads as a rim with real depth behind. */
          this.quadOn(g, place(b1, rOf(b1)*0.7, 12), B.liner);
        }
        /* liner lip: the dark interior only reads as visible when the
           mouth end is actually the NEAR side of the tube. When knocked
           and rotated so the mouth faces away, this must stay hidden —
           otherwise it paints through the barrel's own far wall. */
        const mouthFacing = !knocked || (bcs + bsn) > 0;
        if(mouthFacing) this.quadOn(g, place(H - 0.5, rOf(H)*0.86, 12), B.liner);
      };
      const blid = () => {
        if(!knocked){
          const rim = place(H, B.lidR, 14);
          this.quadOn(g, rim, B.lidDk);
          const dome = [];
          for(let i=0; i<12; i++){
            const phi = (i/12)*Math.PI*2, r2 = B.lidR*0.82;
            dome.push(GG(Math.cos(phi)*r2, Math.sin(phi)*r2, H + 2.6));
          }
          this.quadOn(g, dome, B.lid);
          const knob = GG(0, 0, H + 4.4);
          g.fillStyle(B.lidDk, 1);
          g.fillCircle(knob.x, knob.y, 2.6*this.K*0.45);
          const hinge = GG(-B.lidR*0.85, 0, H + 0.6);
          g.fillStyle(B.pedalDk, 1);
          g.fillCircle(hinge.x, hinge.y, 1.6*this.K*0.45);
        } else {
          /* lid lies flat on the ground, just past the OPEN end of
             the fallen barrel — mouth is at a = 1+H (not the closed
             base at a = 1), so the lid sits beyond that. */
          const La = 1 + H + B.lidR*0.75, Lh = 1;
          const disc = [], inner = [];
          for(let i=0; i<12; i++){
            const phi = (i/12)*Math.PI*2;
            disc.push(GG(La + Math.cos(phi)*B.lidR, Math.sin(phi)*B.lidR, Lh));
            const r2 = B.lidR*0.8;
            inner.push(GG(La + Math.cos(phi)*r2, Math.sin(phi)*r2, Lh + 0.7));
          }
          this.quadOn(g, disc, B.lidDk);
          this.quadOn(g, inner, B.lid);
          const knob = GG(La, 0, Lh + 1.3);
          g.fillStyle(B.lidDk, 1);
          g.fillCircle(knob.x, knob.y, 2.2*this.K*0.45);
        }
      };
      const bpedal = () => {
        if(knocked) return;
        const a0 = GG(B.baseR*0.55, 0, 1.5);
        const a1 = GG(B.baseR*0.95, 0, 5.5);
        g.lineStyle(Math.max(1.5, 1.4*this.K*0.4), B.pedalDk, 1);
        g.lineBetween(a0.x, a0.y, a1.x, a1.y);
        const p0 = GG(B.baseR*0.95, -3.2, 0.6), p1 = GG(B.baseR*1.25, 3.2, 0.6);
        g.fillStyle(B.pedal, 1);
        g.fillEllipse((p0.x+p1.x)/2, (p0.y+p1.y)/2, 7*this.K*0.42, 3*this.K*0.42);
      };

      const bparts = [
        { d: knocked ? dAt(1.5, 0, B.baseR) : dAt(0, 0, 1.5), fn: bbody },
        { d: knocked ? dAt(0.5, -6, 3) : dAt(B.baseR*0.9, 0, 3), fn: bpedal },
        { d: knocked ? dAt(1+H+B.lidR*0.75, 0, 1) : ringDepth(H), fn: blid }
      ];
      bparts.sort((p1, p2) => p1.d - p2.d);
      for(const pt of bparts) pt.fn();
    } else if(kind === "driveway"){
      // concrete apron cutting across the sidewalk — the cross-slope hazard
      this.quadOn(g, [
        W(-34,-TILE,2), W(34,-TILE,2), W(46,TILE+14,-3), W(-46,TILE+14,-3)
      ], 0xb5afa2);
      this.edgeOn(g, [
        W(-34,-TILE,2), W(34,-TILE,2), W(46,TILE+14,-3), W(-46,TILE+14,-3)
      ], 0x968f81, 2);
      g.lineStyle(1.5, 0x968f81, 1);
      for(const lx of [-18, 0, 18]){
        const a=W(lx,-TILE,2), b=W(lx*1.35, TILE+14,-3);
        g.lineBetween(a.x, a.y, b.x, b.y);
      }
    } else if(kind === "crack"){
      g.lineStyle(2.5, 0x5d574c, 1);
      let px = W(-14,-8,0.5);
      g.beginPath(); g.moveTo(px.x, px.y);
      for(const [dx,dy] of [[-4,6],[6,4],[2,10],[10,6]]){
        const q = W(dx*2, dy, 0.5); g.lineTo(q.x, q.y);
      }
      g.strokePath();
    }
  }


  drawLid(b){
    const {hx, hy, z0, z1} = b;
    const hs = (this.tipDir || 1) >= 0 ? 1 : -1; // hinge on the side that meets the ground
    const A = this.lidAng * hs, cA = Math.cos(A), sA = Math.sin(A);
    const yh = -hy * hs, zh = z0;                // hinge line
    const H = (x, y, z) => {                     // hinge rotation, then normal pipeline
      const dy = y - yh, dz = z - zh;
      return this.P(x, yh + dy*cA - dz*sA, zh + dy*sA + dz*cA);
    };
    const HN = (nx, ny, nz) => {                 // normals: hinge rot then roll+facing
      const ny2 = ny*cA - nz*sA, nz2 = ny*sA + nz*cA;
      return this.R(nx, ny2, nz2);
    };
    const C = (sx, sy, sz) => H(sx*hx, sy*hy, sz === 1 ? z1 : z0);
    const faces = [
      { n:{x:0,y:0,z: 1}, pts:[C( 1,-1,1), C( 1, 1,1), C(-1, 1,1), C(-1,-1,1)] },
      { n:{x:0,y:0,z:-1}, pts:[C( 1,-1,0), C( 1, 1,0), C(-1, 1,0), C(-1,-1,0)] },
      { n:{x: 1,y:0,z:0}, pts:[C( 1,-1,0), C( 1, 1,0), C( 1, 1,1), C( 1,-1,1)] },
      { n:{x:-1,y:0,z:0}, pts:[C(-1,-1,0), C(-1, 1,0), C(-1, 1,1), C(-1,-1,1)] },
      { n:{x:0,y: 1,z:0}, pts:[C( 1, 1,0), C(-1, 1,0), C(-1, 1,1), C( 1, 1,1)] },
      { n:{x:0,y:-1,z:0}, pts:[C( 1,-1,0), C(-1,-1,0), C(-1,-1,1), C( 1,-1,1)] }
    ];
    for(const fc of faces){
      const w = HN(fc.n.x, fc.n.y, fc.n.z);
      if((w.x + w.y + w.z) <= 0) continue;
      const col = w.z > 0.5 ? SKIN.bodyTop
                : w.z < -0.5 ? SKIN.lidInner
                : (w.x >= w.y) ? SKIN.bodyRight : SKIN.bodyLeft;
      this.quad(fc.pts, col);
      this.edge(fc.pts);
    }
  }

  quad(pts, color, alpha=1){
    this.g.fillStyle(color, alpha);
    this.g.fillPoints(pts.map(p => new Phaser.Geom.Point(p.x, p.y)), true);
  }
  edge(pts, color=SKIN.outline, w=2){
    this.g.lineStyle(w, color, 1);
    this.g.strokePoints(pts.map(p => new Phaser.Geom.Point(p.x, p.y)), true);
  }


  drawBox(b, cTop, cRight, cLeft, outline=true, decal=false, cBottom=SKIN.belly){
    const {hx, hy, z0, z1} = b, ox = b.ox || 0, oy = b.oy || 0;
    const C = (sx, sy, sz) => this.P(ox + sx*hx, oy + sy*hy, sz === 1 ? z1 : z0);
    const faces = [
      { n:{x:0,y:0,z: 1}, pts:[C( 1,-1,1), C( 1, 1,1), C(-1, 1,1), C(-1,-1,1)] },
      { n:{x:0,y:0,z:-1}, pts:[C( 1,-1,0), C( 1, 1,0), C(-1, 1,0), C(-1,-1,0)] },
      { n:{x: 1,y:0,z:0}, pts:[C( 1,-1,0), C( 1, 1,0), C( 1, 1,1), C( 1,-1,1)] },
      { n:{x:-1,y:0,z:0}, pts:[C(-1,-1,0), C(-1, 1,0), C(-1, 1,1), C(-1,-1,1)] },
      { n:{x:0,y: 1,z:0}, pts:[C( 1, 1,0), C(-1, 1,0), C(-1, 1,1), C( 1, 1,1)] },
      { n:{x:0,y:-1,z:0}, pts:[C( 1,-1,0), C(-1,-1,0), C(-1,-1,1), C( 1,-1,1)] }
    ];
    for(const fc of faces){
      /* decals have no geometric top/bottom — but their SIDE faces always draw,
         even when a roll points them skyward (fixes the vanishing stripe) */
      if(decal && fc.n.z !== 0) continue;
      const w = this.R(fc.n.x, fc.n.y, fc.n.z);
      if((w.x + w.y + w.z) <= 0) continue;
      let col;
      if(w.z > 0.5)       col = decal ? cRight : cTop;
      else if(w.z < -0.5) col = decal ? null : cBottom;
      else                col = (w.x >= w.y) ? cRight : cLeft;
      if(col == null) continue;
      this.quadOn(this.g, fc.pts, col);
      if(outline) this.edgeOn(this.g, fc.pts);
    }
  }

  disc(center, r, color, outlineC){
    const pts = [];
    for(let i=0; i<14; i++){
      const a = (i/14)*Math.PI*2;
      pts.push(this.P(center.x + Math.cos(a)*r, center.y, center.z + Math.sin(a)*r));
    }
    this.quadOn(this.g, pts, color);
    if(outlineC !== undefined) this.edgeOn(this.g, pts, outlineC, 2);
  }

  drawWheel(c, sideSign){
    const W2 = 7.5, steps = 5;
    const slices = [];
    for(let i=0; i<=steps; i++){
      const oy = c.y + sideSign*(-W2/2 + W2*i/steps);
      slices.push({ y:oy, depth: this.depth(c.x, oy, c.z) });
    }
    slices.sort((a,b) => a.depth - b.depth);
    for(let i=0; i<slices.length; i++){
      const isFace = i === slices.length-1;
      this.disc({x:c.x, y:slices[i].y, z:c.z}, WHEEL.r,
                isFace ? SKIN.wheel : SKIN.wheelDark,
                isFace ? SKIN.outline : undefined);
    }
    const face = slices[slices.length-1].y;
    this.disc({x:c.x, y:face, z:c.z}, WHEEL.r*0.55, SKIN.wheelHubFace);
    const a = this.wheelPhase + c.x*0.2;
    this.disc({ x:c.x + Math.cos(a)*WHEEL.r*0.34, y:face,
                z:c.z + Math.sin(a)*WHEEL.r*0.34 }, 2.4, SKIN.wheelHub);
  }


  drawFlag(bobZ){
    const g = this.g;
    const L = FLAG.z1 - FLAG.z0;
    const bend = this.flagLean*0.5 + this.tipT*1.5;
    const seg = 6, pts = [];
    for(let i=0; i<=seg; i++){
      const s = i/seg, a = bend*s;
      pts.push(this.P(FLAG.base.x,
                      FLAG.base.y - Math.sin(a)*L*s,
                      FLAG.z0 + Math.cos(a)*L*s + bobZ));
    }
    g.lineStyle(3, SKIN.flagPole, 1);
    g.beginPath();
    g.moveTo(pts[0].x, pts[0].y);
    for(let i=1; i<=seg; i++) g.lineTo(pts[i].x, pts[i].y);
    g.strokePath();
    const p = pts[seg], q = pts[seg-1];
    let dx = p.x - q.x, dy = p.y - q.y;
    const dl = Math.hypot(dx, dy) || 1; dx /= dl; dy /= dl;
    g.fillStyle(SKIN.flag, 1);
    g.fillTriangle(p.x, p.y, p.x - dy*11, p.y + dx*11, p.x + dx*20, p.y + dy*20 + 4);
  }


  /* ========== END INJECTED ========== */

  update(t){
    const g = this.g; g.clear();
    this.cameras.main.scrollY = this.scrollY;
    const viewTop = this.scrollY - 60, viewBot = this.scrollY + this.scale.gameSize.height + 60;
    for(const c of this.cards){
      if(c.y + c.h < viewTop || c.y > viewBot) continue;
      /* panel */
      g.fillStyle(0x1c1f26, 1); g.fillRoundedRect(c.x, c.y, c.w, c.h, 10);
      g.lineStyle(1, 0x2b2f38, 1); g.strokeRoundedRect(c.x, c.y, c.w, c.h, 10);
      this.cardX = c.x; this.cardY = c.y;
      this.cardCX = c.x + c.w/2; this.cardCY = c.y + c.h/2 - 8;
      c.draw(t);
    }
  }
}

const game = new Phaser.Game({
  type: Phaser.AUTO, parent: "game", backgroundColor: "#14161b",
  scale: { mode: Phaser.Scale.RESIZE, width: "100%", height: "100%" },
  scene: [GalleryScene]
});
</script>
</body>
